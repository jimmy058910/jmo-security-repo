tools:
- trufflehog
- semgrep
- syft
- trivy
- checkov
- hadolint
- zap
- nuclei
outputs:
- json
- md
- yaml
- html
- simple-html
- sarif
- csv
fail_on: ''
default_profile: balanced
profiles:
  fast:
    # v1.0.0: 9 tools for fast pre-commit checks (5-10 min)
    # Tool list defined in scripts/core/tool_registry.py:PROFILE_TOOLS (single source of truth)
    threads: 8
    timeout: 300
    policy:
      default_policies:
      - zero-secrets
    per_tool:
      semgrep:
        flags:
        - --exclude
        - node_modules
        - --exclude
        - .git
      trivy:
        flags:
        - --no-progress
        - --scanners
        - vuln,secret,misconfig
      nuclei:
        timeout: 300
        flags:
        - -severity
        - critical,high
      checkov:
        flags:
        - --quiet
  slim:
    # v1.0.0: 14 tools for cloud/IaC focused scans (12-18 min)
    # Optimized for AWS/Azure/GCP, Kubernetes, and infrastructure scanning
    # Tool list defined in scripts/core/tool_registry.py:PROFILE_TOOLS (single source of truth)
    threads: 4
    timeout: 500
    policy:
      default_policies:
      - owasp-top-10
      - zero-secrets
    per_tool:
      semgrep:
        flags:
        - --exclude
        - node_modules
        - --exclude
        - .git
      trivy:
        flags:
        - --no-progress
        - --scanners
        - vuln,secret,misconfig
      nuclei:
        timeout: 500
        flags:
        - -severity
        - critical,high,medium
      prowler:
        timeout: 600
        flags:
        - --quiet
      kubescape:
        timeout: 500
        flags:
        - --silent
  balanced:
    # v1.0.0: 18 tools for production scans (18-25 min)
    # Tool list defined in scripts/core/tool_registry.py:PROFILE_TOOLS (single source of truth)
    threads: 4
    timeout: 600
    policy:
      default_policies:
      - owasp-top-10
      - zero-secrets
    per_tool:
      semgrep:
        flags:
        - --exclude
        - node_modules
        - --exclude
        - .git
      trivy:
        flags:
        - --no-progress
      zap:
        flags:
        - -config
        - api.disablekey=true
        - -config
        - spider.maxDuration=5
      nuclei:
        timeout: 600
        flags:
        - -severity
        - critical,high,medium
      prowler:
        timeout: 900
        flags:
        - --quiet
      kubescape:
        timeout: 600
        flags:
        - --silent
  deep:
    # v1.0.0: 29 tools for comprehensive audits (40-70 min)
    # Tool list defined in scripts/core/tool_registry.py:PROFILE_TOOLS (single source of truth)
    threads: 2
    timeout: 900
    retries: 1
    policy:
      default_policies:
      - owasp-top-10
      - zero-secrets
      - pci-dss
      - production-hardening
      - hipaa-compliance
      fail_on_violation: true
    per_tool:
      semgrep:
        flags:
        - --exclude
        - node_modules
        - --exclude
        - .git
      trivy:
        flags:
        - --no-progress
      zap:
        flags:
        - -config
        - api.disablekey=true
        - -config
        - spider.maxDuration=10
      nuclei:
        timeout: 900
        flags:
        - -severity
        - critical,high,medium,low
      noseyparker:
        timeout: 1200
      semgrep-secrets:
        # p/secrets ruleset is very large (3000+ rules) and slow
        # First run downloads rules from semgrep.dev, subsequent runs use cache
        timeout: 1800
        flags:
        - --exclude
        - node_modules
        - --exclude
        - .git
      afl++:
        timeout: 1800
        flags:
        - -m
        - none
      prowler:
        timeout: 1200
        flags:
        - --quiet
      kubescape:
        timeout: 900
        flags:
        - --silent
      mobsf:
        timeout: 1800
      lynis:
        timeout: 900
      yara:
        timeout: 900
        flags:
        - --max-rules-per-file=500
      grype:
        timeout: 900
profiling:
  min_threads: 2
  max_threads: 8
  default_threads: 4
# Deduplication Configuration (cross-tool finding clustering)
deduplication:
  similarity_threshold: 0.65   # 0.5-1.0 (lower = more aggressive clustering)
# Policy-as-Code Configuration (Feature #5, v1.0.0)
policy:
  enabled: true                  # Enable policy evaluation
  auto_evaluate: true             # Auto-evaluate after scans
  default_policies:               # Policies to apply by default
  - owasp-top-10
  - zero-secrets
  fail_on_violation: false        # Fail CI/CD if violations found
  opa:
    binary: opa                   # Path to OPA binary
    version: ">=0.70.0"           # Minimum OPA version
    timeout: 30                   # Policy evaluation timeout (seconds)
telemetry:
  enabled: true
