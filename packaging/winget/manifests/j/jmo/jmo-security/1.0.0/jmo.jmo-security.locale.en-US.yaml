ReleaseNotes: |-
  JMo Security v1.0.0 - Production Release

  Major Features:
  - 28 security scanners with unified profiles (fast/slim/balanced/deep)
  - SQLite historical storage for trend analysis
  - Machine-readable diffs for CI/CD integration (jmo diff)
  - Tool management commands (jmo tools install/check/update)
  - 6 compliance framework mappings (OWASP, CWE, CIS, NIST, PCI DSS, MITRE)

  Unified Scan Profiles:
  - fast: 8 tools (trufflehog, semgrep, syft, trivy, checkov, hadolint, nuclei, shellcheck)
  - slim: 14 tools (fast + prowler, kubescape, grype, bearer, horusec, dependency-check)
  - balanced: 18 tools (slim + zap, scancode, cdxgen, gosec)
  - deep: 28 tools (balanced + noseyparker, bandit, lynis, yara, falco, afl++, mobsf, akto)

  New Commands:
  - jmo diff: Compare scans for CI/CD (new/fixed/unchanged findings)
  - jmo history: View scan history from SQLite storage
  - jmo trends: Analyze security trends over time
  - jmo tools: Manage tool installation and updates

  Performance:
  - 30-40% noise reduction via cross-tool deduplication
  - 87% test coverage (2,981 tests)
  - CommonFinding schema v1.2.0 with fingerprint-based deduplication

  Breaking Changes:
  - Profiles renamed for consistency (deep now has 28 tools)
  - Results include v1.0.0 metadata wrapper
  - Docker volumes must mount .jmo/history.db for persistence

  Full Changelog: https://github.com/jimmy058910/jmo-security-repo/blob/main/CHANGELOG.md
