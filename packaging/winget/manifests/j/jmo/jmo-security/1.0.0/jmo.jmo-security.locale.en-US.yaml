ShortDescription: Unified security scanning suite with 28+ tools and 4 scan profiles
Description: |-
  JMo Security is a terminal-first security audit toolkit that orchestrates
  28+ scanners with unified outputs and multi-target scanning capabilities.

  WINDOWS COMPATIBILITY:
  - Full tool suite available via WSL2 + Docker Desktop (recommended)
  - Native Windows: Use --profile fast or --profile balanced for best experience
  - All 4 scan profiles work with Docker mode

  Features:
  - Multi-target scanning (repositories, containers, IaC, web apps, GitLab, Kubernetes)
  - 28+ integrated security tools organized into 4 unified profiles
  - SQLite historical storage for trend analysis
  - Machine-readable diffs for CI/CD integration (jmo diff)
  - Tool management commands (jmo tools install/check/update)
  - 6 compliance framework mappings (OWASP, CWE, CIS, NIST, PCI DSS, MITRE)
  - Interactive wizard for guided scanning workflows
  - Unified reporting (JSON, Markdown, HTML dashboard, SARIF 2.1.0)
  - Profile-based configuration (fast/slim/balanced/deep)
  - Cross-platform (Windows, macOS, Linux)

  Scan Profiles:
  - fast: 8 tools, 5-10 min (pre-commit, PR validation)
  - slim: 14 tools, 12-18 min (Cloud/IaC, AWS/Azure/GCP/K8s)
  - balanced: 18 tools, 18-25 min (Production scans, CI/CD)
  - deep: 28 tools, 40-70 min (Compliance audits, pentests)

  What's New in v1.0.0:
  - 28 security scanners with unified profiles
  - SQLite historical storage for trend analysis
  - Machine-readable diffs for CI/CD integration
  - Tool management commands (jmo tools)
  - 6 compliance framework mappings

  Target Users:
  - DevSecOps engineers automating security in CI/CD pipelines
  - Security teams performing comprehensive audits
  - Developers integrating security into development workflows
  - Platform engineers securing containerized and cloud infrastructure

