---
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: Manual release workflow requires version bump type and changelog entry for maintainer control
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch  # 0.7.1 → 0.7.2 (bug fixes)
          - minor  # 0.7.1 → 0.8.0 (new features, backwards compatible)
          - major  # 0.7.1 → 1.0.0 (breaking changes)
      changelog_entry:
        description: 'Changelog entry (brief summary of changes)'
        required: true
        type: string

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_ECR_PUBLIC: public.ecr.aws
  IMAGE_NAME_GHCR: ${{ github.repository_owner }}/jmo-security  # GitHub: jimmy058910/jmo-security
  IMAGE_NAME_DOCKERHUB: jmogaming/jmo-security                  # Docker Hub: jmogaming/jmo-security
  IMAGE_NAME_ECR_PUBLIC: m2d8u2k1/jmo-security                  # ECR Public: public.ecr.aws/m2d8u2k1/jmo-security
  AWS_REGION: us-east-1                                         # ECR Public only exists in us-east-1

permissions:
  contents: read
  packages: write
  id-token: write         # For OIDC (PyPI Trusted Publishers + GitHub OIDC)
  security-events: write  # For uploading SARIF files to GitHub Security

jobs:
  # ─── RELEASE PREP (workflow_dispatch only) ───────────────────────────────────

  # Bump version, update tools, create release branch and PR
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      release_branch: ${{ steps.create_branch.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml requests packaging toml

      - name: Update ALL tools to latest versions
        id: tool_updates
        run: |
          echo "Checking for tool updates..."
          python3 scripts/dev/update_versions.py --check-latest > check_output.txt || true
          cat check_output.txt

          if grep -q "UPDATE AVAILABLE" check_output.txt; then
            echo "Updating all tools to latest versions..."
            python3 scripts/dev/update_versions.py --update-all
            python3 scripts/dev/update_versions.py --sync
            echo "tools_updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "All tools already up-to-date"
            echo "tools_updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in pyproject.toml
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          CURRENT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION" || true

          # Bump version based on input (env var, not interpolated, to avoid shell injection)
          case "$VERSION_BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        env:
          CHANGELOG_ENTRY: ${{ inputs.changelog_entry }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          TODAY=$(date +%Y-%m-%d)

          # Create new changelog entry
          {
            echo "## [$NEW_VERSION] - $TODAY"
            echo ""
            echo "### Summary"
            echo ""
            echo "$CHANGELOG_ENTRY"
            echo ""
            echo "### Changes"
            echo ""

            # Add tool updates if any
            if [[ "${{ steps.tool_updates.outputs.tools_updated }}" == "true" ]]; then
              echo "**Security Tool Updates:**"
              echo ""
              git diff versions.yaml | grep "^[+-]  version:" | while read -r line; do
                echo "- $line"
              done
              echo ""
            fi
          } > new_entry.md

          # Insert new entry after "# Changelog" header
          sed -i "/^# Changelog/r new_entry.md" CHANGELOG.md

      - name: Create release branch
        id: create_branch
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          BRANCH="release-v${NEW_VERSION}"

          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Commit release changes
        env:
          CHANGELOG_ENTRY: ${{ inputs.changelog_entry }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          VERSION_BUMP: ${{ inputs.version_bump }}
          TOOLS_UPDATED: ${{ steps.tool_updates.outputs.tools_updated }}
        run: |
          git add pyproject.toml CHANGELOG.md

          # Add tool updates if any (env var, not interpolated, to avoid shell injection)
          if [[ "$TOOLS_UPDATED" == "true" ]]; then
            git add versions.yaml Dockerfile.deep Dockerfile.balanced Dockerfile.slim Dockerfile.fast
          fi

          # Create commit
          cat > commit_message.txt << 'COMMIT_MSG'
          release: v$NEW_VERSION

          $CHANGELOG_ENTRY

          This release includes:
          - Version bump: $VERSION_BUMP
          - All security tools updated to latest versions
          - CHANGELOG.md updated

          Generated with Claude Code (https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>
          COMMIT_MSG

          # Substitute variables via env (safer than GitHub-context interpolation in run:)
          # shellcheck disable=SC2016
          # SC2016 flags the "$NAME" literals below — correct: these are Python string
          # tokens (fed to python3 via printf) that we INTENTIONALLY don't want the shell
          # to expand. The actual substitution happens in Python via os.environ[].
          printf '%s\n' \
            'import os,pathlib as PL' \
            'p=PL.Path("commit_message.txt")' \
            't=p.read_text()' \
            't=t.replace("$NEW_VERSION",os.environ["NEW_VERSION"])' \
            't=t.replace("$CHANGELOG_ENTRY",os.environ["CHANGELOG_ENTRY"])' \
            't=t.replace("$VERSION_BUMP",os.environ["VERSION_BUMP"])' \
            'p.write_text(t)' \
            | python3

          git commit -F commit_message.txt

      - name: Push release branch
        env:
          BRANCH: ${{ steps.create_branch.outputs.branch }}
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG_ENTRY: ${{ inputs.changelog_entry }}
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          BRANCH="${{ steps.create_branch.outputs.branch }}"

          # Create PR body
          {
            echo "## Release v${NEW_VERSION}"
            echo ""
            echo "### Summary"
            echo ""
            echo "$CHANGELOG_ENTRY"
            echo ""
            echo "### Changes in this release"
            echo ""
            echo "**Version Bump:** $VERSION_BUMP"
            echo ""
            echo "**Tool Updates:**"

            # Add tool update details
            if [[ "${{ steps.tool_updates.outputs.tools_updated }}" == "true" ]]; then
              git diff origin/main..HEAD versions.yaml | grep "^[+-]  version:" | while read -r line; do
                echo "- $line"
              done
            else
              echo "- All tools already up-to-date"
            fi

            echo ""
            echo "### Pre-Release Checklist"
            echo ""
            echo "- ✅ All security tools updated to latest versions"
            echo "- ✅ Version bumped in pyproject.toml"
            echo "- ✅ CHANGELOG.md updated"
            echo "- ⏳ CI tests pending"
            echo ""
            echo "### Release Process"
            echo ""
            echo "1. **Merge this PR** to main"
            echo "2. **Workflow will automatically:**"
            echo "   - Create git tag v${NEW_VERSION}"
            echo "   - Publish to PyPI via Trusted Publishers"
            echo "   - Build and push Docker images"
            echo "   - Create GitHub release"
            echo ""
            echo "---"
            echo ""
            echo "🤖 **Automated Release PR**"
            echo "📅 **Created**: $(date +%Y-%m-%d)"
            echo "🔗 **Workflow**: \`.github/workflows/release.yml\`"
          } > pr_body.txt

          # Create PR
          gh pr create \
            --title "release: v${NEW_VERSION}" \
            --body-file pr_body.txt \
            --base main \
            --head "$BRANCH" \
            --label "release"

      - name: Summary
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          BRANCH: ${{ steps.create_branch.outputs.branch }}
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          {
            echo "## Automated Release Summary"
            echo ""
            echo "**Release PR created successfully**"
            echo ""
            echo "- **Version**: v${NEW_VERSION}"
            echo "- **Type**: ${VERSION_BUMP}"
            echo "- **Branch**: \`${BRANCH}\`"
            echo ""
            echo "### Next Steps"
            echo ""
            echo "1. Review the pull request"
            echo "2. Verify CI tests pass"
            echo "3. Merge the PR to trigger release workflow"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── RELEASE PUBLISHING (tag push v* only) ───────────────────────────────────

  # PRE-RELEASE GATE: Comprehensive release validation (v1.0.0+)
  pre-release-check:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10  # Increased from 5 to accommodate full test suite
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools (for pre-release checks)
        run: |
          # Install TruffleHog for secrets scanning
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Install Bandit for security audit
          pip install bandit

      - name: Install GitHub CLI (for CI status checks)
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          ARCH=$(dpkg --print-architecture)
          KEYRING=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$ARCH signed-by=$KEYRING] https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Run comprehensive pre-release checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running comprehensive pre-release validation..."
          echo ""
          python3 -m scripts.cli.jmo validate --tier quick --json || {
            echo ""
            echo "PRE-RELEASE CHECKS FAILED!"
            echo "   Fix issues above before releasing."
            echo ""
            exit 1
          }

      - name: Generate release notes preview
        run: |
          echo ""
          echo "📝 Release notes preview:"
          echo ""
          python3 scripts/dev/generate_release_notes.py "${GITHUB_REF##*/}" || {
            echo ""
            echo "⚠️  WARNING: Failed to generate release notes"
            echo "   Verify CHANGELOG.md has entry for ${GITHUB_REF##*/}"
          }

  # Build and publish Python package to PyPI
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: pre-release-check  # BLOCKS release if tools are outdated
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: release-pypi-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches version
        run: |
          VERSION=$(python -c 'import tomllib,sys;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          TAG=${GITHUB_REF##*/}
          if [ "v$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match project version v$VERSION" >&2
            exit 1
          fi

      - name: Validate README will render correctly on PyPI
        run: |
          echo "✅ README.md will be published to PyPI from this release"
          echo "📝 Current README.md size: $(wc -c < README.md) bytes"
          echo "📊 Badge count: $(grep -c '!\[' README.md || echo 0)"
          echo ""
          echo "⚠️  Note: If you see badge/content differences on PyPI after release,"
          echo "    run 'make validate-readme' locally to check for drift."

      - name: Build sdist/wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          skip-existing: true  # Allow re-running releases if PyPI already has the version

  # ─── DOCKER: Native multi-arch builds (amd64 + arm64) ──────────────────────
  # Split into 3 jobs: build-amd64, build-arm64, merge manifests
  # Uses native ARM runners instead of QEMU emulation (65 min → ~20 min)

  docker-build-amd64:
    name: Docker ${{ matrix.variant }} (amd64)
    runs-on: ubuntu-latest
    needs: pypi-publish
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        variant: [deep, balanced, slim, fast]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          # After v1.0.2 every variant has its own Dockerfile.<variant> — no
          # special case for the heavyweight image (which is now Dockerfile.deep).
          echo "file=Dockerfile.${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.variant }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-amd64
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-build-arm64:
    name: Docker ${{ matrix.variant }} (arm64)
    runs-on: ubuntu-24.04-arm
    needs: pypi-publish
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        variant: [deep, balanced, slim, fast]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          # After v1.0.2 every variant has its own Dockerfile.<variant> — no
          # special case for the heavyweight image (which is now Dockerfile.deep).
          echo "file=Dockerfile.${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.variant }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-arm64
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge amd64 + arm64 digests into multi-arch manifests, push to all registries
  docker-merge:
    name: Merge Docker ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: [docker-build-amd64, docker-build-arm64]
    if: always() && needs.docker-build-amd64.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        variant: [deep, balanced, slim, fast]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials for ECR Public
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::786980363770:role/GitHubActionsECRPublicRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Extract metadata (GHCR tags for manifest creation)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          # NOTE on `suffix=`: the global `flavor: suffix=-<variant>` below gets applied
          # to every tag type including type=raw and type=semver. For the bare-tag family
          # (:latest, :deep, :balanced, :slim, :fast, :full, :1.0.2, :1.0, :1) we override
          # with `suffix=` (empty) per-tag to produce bare tags instead of `:latest-deep`,
          # `:deep-deep`, `:1.0.2-deep`. Without the override we get garbage like `:deep-deep`.
          tags: |
            # Versioned-with-variant: suffix -<variant> applied via global flavor.
            # Produces :1.0.2-deep, :1.0.2-balanced, :1.0.2-slim, :1.0.2-fast (and :1.0-*, :1-*).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Bare semver (no variant suffix) — only on the deep matrix job.
            # Produces :1.0.2, :1.0, :1 — pin-friendly tags for CI.
            type=semver,pattern={{version}},suffix=,enable=${{ matrix.variant == 'deep' }}
            type=semver,pattern={{major}}.{{minor}},suffix=,enable=${{ matrix.variant == 'deep' }}
            type=semver,pattern={{major}},suffix=,enable=${{ matrix.variant == 'deep' }}
            # Bare :latest — points at the heavyweight deep variant.
            type=raw,value=latest,suffix=,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'deep' }}
            # Bare :deep / :balanced / :slim / :fast — user-facing convenience tags
            # referenced in FAQ, USER_GUIDE, DOCKER_README.
            type=raw,value=${{ matrix.variant }},suffix=,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # One-release backward-compat alias: :full points at :deep until users
            # migrate off the old name. Remove in the release after v1.0.2.
            type=raw,value=full,suffix=,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'deep' }}
          flavor: |
            suffix=-${{ matrix.variant }},onlatest=${{ matrix.variant != 'deep' }}
            latest=false

      - name: Download amd64 digest
        uses: actions/download-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-amd64
          path: /tmp/digests-amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: digests-${{ matrix.variant }}-arm64
          path: /tmp/digests-arm64

      - name: Create GHCR multi-arch manifest
        working-directory: /tmp
        env:
          GHCR_IMAGE: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
        run: |
          DIGESTS=""
          for f in digests-amd64/*; do
            DIGESTS="$DIGESTS ${GHCR_IMAGE}@sha256:$(basename "$f")"
          done
          if [ -d digests-arm64 ] && [ "$(ls -A digests-arm64 2>/dev/null)" ]; then
            for f in digests-arm64/*; do
              DIGESTS="$DIGESTS ${GHCR_IMAGE}@sha256:$(basename "$f")"
            done
            echo "Merging amd64 + arm64 manifests"
          else
            echo "arm64 not available, creating amd64-only manifest"
          fi
          TAG_ARGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          # shellcheck disable=SC2086
          # Intentional word splitting: TAG_ARGS is "-t img:a -t img:b ..." and
          # DIGESTS is "ref1 ref2 ...". Both must split into separate args.
          docker buildx imagetools create $TAG_ARGS $DIGESTS

      # Replicate from GHCR to secondary registries using crane
      # (imagetools create can't copy blobs cross-registry; crane handles it)
      - name: Install crane
        run: |
          VERSION="0.20.3"
          BASE="https://github.com/google/go-containerregistry"
          ASSET="go-containerregistry_Linux_x86_64.tar.gz"
          curl -sL "$BASE/releases/download/v$VERSION/$ASSET" \
            | tar xz -C /usr/local/bin crane
          crane version

      - name: Replicate to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        continue-on-error: true
        run: |
          GHCR_IMAGE="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}"
          DOCKERHUB_IMAGE="${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME_DOCKERHUB }}"
          echo "${{ steps.meta.outputs.tags }}" | while read -r FULL_TAG; do
            TAG="${FULL_TAG##*:}"
            echo "Copying $GHCR_IMAGE:$TAG -> $DOCKERHUB_IMAGE:$TAG"
            crane copy "$GHCR_IMAGE:$TAG" "$DOCKERHUB_IMAGE:$TAG" --platform all || true
          done

      - name: Replicate to ECR Public
        continue-on-error: true
        run: |
          GHCR_IMAGE="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}"
          ECR_IMAGE="${{ env.REGISTRY_ECR_PUBLIC }}/${{ env.IMAGE_NAME_ECR_PUBLIC }}"
          echo "${{ steps.meta.outputs.tags }}" | while read -r FULL_TAG; do
            TAG="${FULL_TAG##*:}"
            echo "Copying $GHCR_IMAGE:$TAG -> $ECR_IMAGE:$TAG"
            crane copy "$GHCR_IMAGE:$TAG" "$ECR_IMAGE:$TAG" --platform all || true
          done

      - name: Test image (amd64)
        run: |
          TEST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1 | awk -F: '{print $NF}')
          echo "Testing GHCR: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TEST_TAG}"
          docker pull --platform linux/amd64 "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TEST_TAG}"
          docker run --rm --platform linux/amd64 "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TEST_TAG}" --help
          docker run --rm --platform linux/amd64 "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TEST_TAG}" scan --help

  # Benchmark image sizes (v0.6.1+ optimization tracking)
  docker-size-benchmark:
    name: Benchmark Docker Image Sizes
    runs-on: ubuntu-latest
    needs: docker-merge
    if: always() && needs.docker-merge.result == 'success'
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Strip 'v' prefix
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull and measure all variants
        run: |
          {
            echo "## Docker Image Size Comparison (${{ github.ref_name }} - 4 Variants)"
            echo ""
            echo "| Variant | Size (amd64) | Size (arm64) | Reduction vs v0.6.0 |"
            echo "|---------|--------------|--------------|---------------------|"
          } > size-comparison.md

          for VARIANT in full balanced slim fast; do
            TAG="${{ steps.tag.outputs.value }}-${VARIANT}"
            IMAGE="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TAG}"

            echo "Measuring $IMAGE..."

            # Get size for amd64 platform from manifest
            SIZE_AMD64=$(docker manifest inspect "$IMAGE" | \
              jq -r '.manifests[] | select(.platform.architecture=="amd64") | .size' | \
              numfmt --to=iec-i --suffix=B --format="%.1f")

            # Get size for arm64 platform from manifest
            SIZE_ARM64=$(docker manifest inspect "$IMAGE" | \
              jq -r '.manifests[] | select(.platform.architecture=="arm64") | .size' | \
              numfmt --to=iec-i --suffix=B --format="%.1f")

            echo "| ${VARIANT} | ${SIZE_AMD64} | ${SIZE_ARM64} | TBD (manual comparison) |" >> size-comparison.md
          done

          {
            echo ""
            echo "**v1.0.0 Target Sizes (Phase 1 Optimizations):**"
            echo "- Full: ~1.97 GB (26 Docker-ready tools, 155 MB savings)"
            echo "- Balanced: ~1.41 GB (21 tools, production CI/CD)"
            echo "- Slim: ~557 MB (15 tools, cloud-focused)"
            echo "- Fast: ~502 MB (8 tools, CI/CD gate)"
            echo ""
            echo "**Phase 1 Optimizations Applied (155 MB savings):**"
            echo "- Nuclei template filtering (65 MB)"
            echo "- Python bytecode cleanup (40 MB)"
            echo "- Binary stripping (15 MB)"
            echo "- Java runtime cleanup (30 MB)"
            echo "- .dockerignore exclusions (5 MB)"
          } >> size-comparison.md

          cat size-comparison.md

      - name: Upload size comparison
        uses: actions/upload-artifact@v7
        with:
          name: docker-size-comparison-${{ steps.tag.outputs.value }}
          path: size-comparison.md

  # Scan Docker images for vulnerabilities
  docker-scan:
    name: Scan Docker ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: docker-merge
    if: always() && needs.docker-merge.result == 'success'
    strategy:
      matrix:
        variant: [deep, balanced, slim, fast]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          # For tags like v0.4.0, the image is tagged as 0.4.0-variant (without 'v')
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Strip 'v' prefix
            echo "value=${VERSION}-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${{ steps.tag.outputs.value }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.variant }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-${{ matrix.variant }}.sarif'
          category: 'docker-${{ matrix.variant }}'

  # Update Docker Hub README
  docker-hub-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    # Run on version tags (after docker-build) OR on manual workflow_dispatch
    needs: docker-merge
    if: |
      always() &&
      (needs.docker-merge.result == 'success' || needs.docker-merge.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        # Requires secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (PAT with read/write/delete scope)
        # Create PAT at: https://hub.docker.com/settings/security
        # Add secrets at: https://github.com/${{ github.repository }}/settings/secrets/actions
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME_DOCKERHUB }}
          short-description: "Security audit toolkit with 12 tools - scan repos, images, IaC, URLs, K8s in one unified CLI"
          readme-filepath: ./DOCKER_HUB_README.md

      - name: Docker Hub update skipped
        if: vars.DOCKERHUB_ENABLED != 'true'
        run: |
          echo "Docker Hub README update skipped."
          echo "To enable:"
          echo "1. Create Docker Hub PAT: https://hub.docker.com/settings/security"
          echo "2. Add secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN"
          echo "3. Set repository variable DOCKERHUB_ENABLED=true"

  # Verify PyPI badges auto-update correctly after release
  # NOTE: This job is non-blocking (continue-on-error: true) to prevent badge
  # caching from blocking the entire release. Badges will update within 15-30
  # minutes after PyPI propagation completes.
  verify-badges:
    name: Verify PyPI Badges
    runs-on: ubuntu-latest
    needs: pypi-publish
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true  # Don't block release on badge caching issues
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Wait for PyPI to propagate with retries
        run: |
          echo "⏳ Waiting for PyPI to propagate the new version..."

          # Initial wait (increased from 90s to 2 minutes)
          echo "  Initial wait: 120s..."
          sleep 120

          # Retry loop with exponential backoff
          MAX_RETRIES=5  # Increased from 3 to 5
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo ""
            echo "🔍 Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: Verifying badges..."

            if bash scripts/dev/verify_badges.sh; then
              SUCCESS=true
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              WAIT_TIME=$((60 * RETRY_COUNT))  # 60s, 120s, 180s, 240s exponential backoff
              echo "⏳ Waiting ${WAIT_TIME}s before retry..."
              sleep $WAIT_TIME
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo ""
            echo "⚠️  Badge verification did not complete after $MAX_RETRIES attempts."
            echo ""
            echo "This is expected behavior and does NOT indicate a release failure."
            echo ""
            echo "Badges update asynchronously and typically take 5-30 minutes:"
            echo "  1. PyPI API propagation: 2-5 minutes"
            echo "  2. Badge CDN caching: 15-30 minutes for global propagation"
            echo ""
            echo "The release will proceed successfully. Badges will auto-update."
            echo ""
            echo "Manual verification (optional):"
            echo "  make verify-badges"
            echo ""
            echo "✅ Release workflow continues..."
            exit 0  # Exit with success to mark job as passed
          fi

          echo ""
          echo "✅ Badge verification successful!"
