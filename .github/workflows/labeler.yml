---
name: Auto-label PRs

# Apply labels to pull requests based on changed file paths.
# Configuration lives in .github/labeler.yml (label name → glob patterns).
#
# Pinned to a tagged release rather than @main per the project's CI
# install-hardening convention (see .claude/rules/release.rules.md
# "CI install hardening" — every install pinned to a known version).

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213  # v6.0.0
        with:
          configuration-path: .github/labeler.yml
          # Don't remove labels that no longer match — maintainers may have
          # added labels manually (e.g., `good first issue`, `help wanted`).
          sync-labels: false
