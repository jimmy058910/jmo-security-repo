---
name: CI

# checkov:skip=CKV2_GHA_1: CI workflow requires write permissions for uploading coverage and SARIF results
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Fast validation checks (2-3 minutes)
  quick-checks:
    name: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate GitHub workflows (actionlint)
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          actionlint_flags: -color
          level: error
          fail_level: error

      - name: Validate YAML files (yamllint)
        run: |
          pip install yamllint
          yamllint -c .yamllint.yaml .

      - name: Lint Dockerfile.fast
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.fast
          failure-threshold: warning

      - name: Lint Dockerfile.slim
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.slim
          failure-threshold: warning

      - name: Lint Dockerfile.balanced
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.balanced
          failure-threshold: warning

      - name: Lint Dockerfile.deep
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.deep
          failure-threshold: warning

      - name: Validate requirements-dev.txt Python version
        run: |
          python -m pip install uv==0.11.15  # pinned: matches lockfile regen version (companion to PR #488)
          python scripts/dev/update_dependencies.py --validate

      - name: Check deps-compile freshness
        # The freshness check is a PR-time validation: "did this PR author forget to
        # run `make deps-compile`?" It has no purpose on push events (main is the
        # source of truth) or workflow_dispatch. Dependabot-authored PRs are also
        # excluded because Dependabot's pip resolver emits structurally different
        # (but functionally equivalent) lockfiles from uv -- different extras
        # markers, platform_python_implementation guards, etc. Enforcing byte-for-byte
        # match against uv output on Dependabot output was a category error.
        #
        # Scoped to a single condition: pull_request events from non-Dependabot authors.
        # This replaces the two-condition (user.login + github.ref) gate from PR #323,
        # which missed push-to-main events that inherit Dependabot-format lockfiles
        # after Dependabot PRs merge. See release.rules.md troubleshooting table.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          python -m pip install uv==0.11.15  # pinned: matches lockfile regen version (companion to PR #488)
          uv pip compile --universal --python-version 3.12 -o requirements-dev.txt requirements-dev.in
          git diff --exit-code -- requirements-dev.txt || (echo "requirements-dev.txt is out of date. Run: make deps-compile" && exit 1)

      - name: Audit Python dependencies for vulnerabilities
        run: |
          pip install pip-audit
          # Audit dependencies for known vulnerabilities (CVEs)
          # Uses OSV database for comprehensive vulnerability coverage
          #
          # Ignored advisories (with reasoning):
          # - PYSEC-2025-183 (CVE-2025-45768): "pyjwt weak encryption" — DISPUTED
          #   by the maintainer ("key length is chosen by the application that
          #   uses the library"); no fix version exists; pyjwt is a transitive
          #   dev-only dep via `mcp` (requirements-dev.txt), not used in
          #   production paths. Source:
          #   https://api.osv.dev/v1/vulns/PYSEC-2025-183
          # - GHSA-qp9x-wp8f-qgjj ("tuf platform-dependent delegation path
          #   matching", CVSS 4.0 medium): fixed in tuf 7.0.0, but NOT adoptable.
          #   tuf is a transitive dev-only dep via `sigstore` (SLSA attestation),
          #   and every sigstore release caps tuf<7.0.0, so the fix is
          #   unresolvable until sigstore catches up. Drop this ignore then.
          #   Tracking: #539. Source:
          #   https://github.com/advisories/GHSA-qp9x-wp8f-qgjj
          pip-audit -r requirements-dev.txt --progress-spinner=off \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln GHSA-qp9x-wp8f-qgjj || {
            echo "::warning::Vulnerable dependencies detected. Review and update."
            exit 1
          }

      - name: "Guardrails: forbid tracked venv/artifacts"
        run: bash scripts/dev/guardrails_check.sh

      - name: "Secrets scan (TruffleHog)"
        run: |
          # Pinned install (versions.yaml). The upstream install.sh calls
          # GitHub's API to discover the "latest" tag and has flaked in CI
          # ("unable to find ''" errors). See PR #350 + release.rules.md
          # "CI install hardening" entry. Mirror of the Dockerfile.deep
          # download pattern (--fail + retry + integrity check). Short
          # local var `v` keeps the URL line within yamllint's 140-char limit.
          v="3.94.3"  # trufflehog version per versions.yaml
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 600 \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${v}/trufflehog_${v}_linux_amd64.tar.gz" \
            -o /tmp/trufflehog.tar.gz
          gzip -t /tmp/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /usr/local/bin trufflehog
          chmod +x /usr/local/bin/trufflehog
          trufflehog filesystem . --json --exclude-paths .trufflehog-exclude.txt --only-verified > trufflehog-results.json || true
          VERIFIED=$(jq -r 'select(.Verified == true)' trufflehog-results.json 2>/dev/null | wc -l || echo "0")
          if [ "$VERIFIED" -gt 0 ]; then
            echo "::error::Found $VERIFIED verified secrets! Review trufflehog-results.json"
            exit 1
          fi

      - name: "Check import direction (core/cli layering)"
        run: python scripts/dev/check_import_direction.py

      - name: "Check documentation link freshness"
        run: python scripts/dev/check_doc_links.py

      - name: "Verify PyPI badge version matches pyproject.toml"
        run: |
          # Ensure badges auto-update correctly after releases
          # Detects version mismatches between local and PyPI
          bash scripts/dev/verify_badges.sh

      - name: "Lint Preview (subset of lint-full)"
        run: |
          # Install lint dependencies
          python -m pip install --upgrade 'pip<25.3'
          pip install -r requirements-dev.txt

          # Run critical lint checks (catches 80% of nightly failures early)
          echo "::group::Markdownlint"
          npx markdownlint-cli2 "**/*.md" "#node_modules" || echo "⚠️  Markdownlint issues found (non-blocking preview)"
          echo "::endgroup::"

          echo "::group::Mypy (scripts only)"
          mypy scripts/ || echo "⚠️  Mypy issues found (non-blocking preview)"
          echo "::endgroup::"

          echo "::group::Ruff"
          ruff check scripts/ tests/ || echo "⚠️  Ruff issues found (non-blocking preview)"
          echo "::endgroup::"

          echo "✅ Lint preview complete. Full lint-full runs nightly at 2 AM UTC (scheduled.yml)."

      - name: Validate SARIF schema
        run: |
          echo "🔍 Validating SARIF schema compliance..."

          # Install required packages for SARIF validation
          pip install jsonschema requests

          # Create and validate a minimal test SARIF file using Python
          python3 -c "
          import json, jsonschema, requests, sys, os

          # Create minimal valid SARIF 2.1.0 test file
          sarif_data = {
              '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/Schemata/sarif-schema-2.1.0.json',
              'version': '2.1.0',
              'runs': [
                  {
                      'tool': {
                          'driver': {
                              'name': 'jmo-security-test',
                              'version': '0.8.0',
                              'informationUri': 'https://github.com/jimmy058910/jmo-security-repo'
                          }
                      },
                      'results': []
                  }
              ]
          }

          try:
              # Download SARIF 2.1.0 schema from Microsoft SARIF SDK repository
              microsoft_sarif_url = 'https://raw.githubusercontent.com/microsoft/sarif-sdk/main/src/Sarif/Schemata/sarif-2.1.0-rtm.6.json'
              print(f'Downloading SARIF 2.1.0 schema from Microsoft SDK: {microsoft_sarif_url}')

              response = requests.get(microsoft_sarif_url)
              response.raise_for_status()

              schema = response.json()
              print('✅ SARIF schema downloaded and parsed successfully')

              # Validate the test SARIF file
              jsonschema.validate(sarif_data, schema)
              print('✅ SARIF schema validation passed')
              print('✅ SARIF reporter can generate valid SARIF 2.1.0 files')

          except requests.RequestException as e:
              print(f'❌ Failed to download SARIF schema: {e}')
              sys.exit(1)
          except json.JSONDecodeError as e:
              print(f'❌ Failed to parse SARIF schema JSON: {e}')
              sys.exit(1)
          except Exception as e:
              print(f'❌ SARIF validation failed: {e}')
              sys.exit(1)
          "

  # Sharded test execution across all platforms
  # Ubuntu: 4 parallel shards with coverage (primary CI target)
  # macOS/Windows: single shard each, no coverage (cross-platform validation)
  test-sharded:
    name: Test ${{ matrix.os }} Shard ${{ matrix.shard }}/${{ matrix.total-shards }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shard: 1
            total-shards: 4
          - os: ubuntu-latest
            shard: 2
            total-shards: 4
          - os: ubuntu-latest
            shard: 3
            total-shards: 4
          - os: ubuntu-latest
            shard: 4
            total-shards: 4
          - os: macos-latest
            shard: 1
            total-shards: 1
          - os: windows-2022
            shard: 1
            total-shards: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies (with retry)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_DEFAULT_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade 'pip<25.3'
          for attempt in 1 2 3; do
            echo "[deps] attempt ${attempt} to install requirements-dev.txt"
            if pip install -r requirements-dev.txt; then
              break
            fi
            sleep 5
          done
          # Install project in editable mode
          for attempt in 1 2 3; do
            echo "[deps] attempt ${attempt} to install project in editable mode"
            if pip install -e .; then
              break
            fi
            sleep 5
          done

      - name: Run sharded tests with coverage (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          CI: "true"
          PYTHONUTF8: "1"
          JMO_THREADS: "2"
          SKIP_REACT_BUILD_CHECK: "true"
        run: |
          python -m pytest -q \
            --disable-warnings \
            --reruns 2 \
            --reruns-delay 2 \
            --splits ${{ matrix.total-shards }} \
            --group ${{ matrix.shard }} \
            --splitting-algorithm least_duration \
            --cov=scripts \
            --cov-report=xml:coverage-shard-${{ matrix.os }}-${{ matrix.shard }}.xml \
            -m "not smoke and not requires_tools and not docker"

      - name: Run tests (macOS, no coverage)
        if: matrix.os == 'macos-latest'
        env:
          CI: "true"
          PYTHONUTF8: "1"
          JMO_THREADS: "2"
          SKIP_REACT_BUILD_CHECK: "true"
        run: |
          python -m pytest -q \
            --disable-warnings \
            --reruns 2 \
            --reruns-delay 2 \
            -p no:xdist \
            -m "not smoke and not requires_tools and not docker"

      - name: Configure Windows temp directory for faster I/O
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:\Temp" | Out-Null
          "TEMP=D:\Temp" | Out-File -Append $env:GITHUB_ENV
          "TMP=D:\Temp" | Out-File -Append $env:GITHUB_ENV

      - name: Run tests (Windows, no coverage, no reruns)
        if: matrix.os == 'windows-2022'
        continue-on-error: true  # Windows has intermittent hangs; non-blocking until fully stabilized
        timeout-minutes: 15
        env:
          CI: "true"
          PYTHONUTF8: "1"
          JMO_THREADS: "2"
          SKIP_REACT_BUILD_CHECK: "true"
        run: |
          python -m pytest -q \
            --disable-warnings \
            --timeout=60 \
            -p no:xdist \
            -p no:rerunfailures \
            -m "not smoke and not requires_tools and not docker and not slow"

      - name: Windows post-test cleanup
        if: matrix.os == 'windows-2022' && always()
        shell: pwsh
        run: |
          $procs = Get-Process -Name python,cmd,node,java -ErrorAction SilentlyContinue |
            Where-Object { $_.Id -ne $PID }
          if ($procs) {
            Write-Host "Killing $($procs.Count) orphan processes"
            $procs | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      - name: Upload shard coverage artifact (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.os }}-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.os }}-${{ matrix.shard }}.xml
          retention-days: 1

  # Aggregate coverage from all shards and upload to Codecov
  coverage-aggregate:
    name: Aggregate Coverage
    runs-on: ubuntu-latest
    needs: test-sharded
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Needed for Codecov OIDC
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-shard-ubuntu-latest-*
          merge-multiple: true

      - name: Install coverage tool
        run: pip install coverage[toml]

      - name: Combine coverage reports
        run: |
          # List downloaded coverage files
          echo "📊 Coverage files from shards:"
          ls -la coverage-shard-*.xml

          # Combine XML reports using coverage.py
          # First convert XML to .coverage files, then combine
          pip install coverage[toml]

          # Create a simple Python script to merge XML coverage
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import re
          import sys

          # Helpers for branch-coverage merging (extends PR #357's line-rate fix).
          # `condition-coverage` from coverage.py is "X% (covered/total)";
          # `missing-branches` is a comma-separated list of branch targets
          # (line numbers) — OMITTED entirely when nothing is missing, never
          # emitted as an empty string. So absent attribute means "all
          # branches covered on this line in this shard".

          def parse_missing_branches(s):
              if not s:
                  return set()
              return {b.strip() for b in s.split(',') if b.strip()}

          def parse_condition_total(s):
              # Returns the `total` from "X% (covered/total)"; 0 if not parseable.
              if not s:
                  return 0
              m = re.search(r'\((\d+)/(\d+)\)', s)
              return int(m.group(2)) if m else 0

          def merge_branch_attrs(existing, incoming):
              """Update `existing` <line> in-place with the union of branch
              coverage data from `incoming`. A branch counts as covered in the
              merged output if covered in EITHER shard, equivalent to:
                  union_missing = existing_missing ∩ incoming_missing
              Total branch count is the same in both shards (same source code);
              we take max defensively in case one shard skipped the line.
              """
              if existing.get('branch') != 'true' and incoming.get('branch') != 'true':
                  return
              existing_missing = parse_missing_branches(existing.get('missing-branches', ''))
              incoming_missing = parse_missing_branches(incoming.get('missing-branches', ''))
              union_missing = existing_missing & incoming_missing  # intersection: missing in BOTH
              total = max(
                  parse_condition_total(existing.get('condition-coverage', '')),
                  parse_condition_total(incoming.get('condition-coverage', '')),
              )
              if total <= 0:
                  return
              covered = total - len(union_missing)
              pct = (covered / total) * 100
              existing.set('branch', 'true')
              existing.set('condition-coverage', f"{pct:.0f}% ({covered}/{total})")
              if union_missing:
                  # Lex sort handles coverage.py's non-numeric branch targets
                  # (e.g. "exit" when a branch leaves the function); int() sort
                  # raises ValueError on those and would silently abort the
                  # outer per-file try/except, dropping the whole shard's merge.
                  existing.set('missing-branches', ','.join(sorted(union_missing)))
              elif 'missing-branches' in existing.attrib:
                  # Fully covered after merge — drop the attribute to match
                  # coverage.py's emission convention (it omits, doesn't empty).
                  del existing.attrib['missing-branches']

          def merge_coverage_xml(files, output):
              """Merge multiple coverage XML files into one."""
              if not files:
                  print("No coverage files to merge")
                  sys.exit(1)

              # Parse first file as base
              base_tree = ET.parse(files[0])
              base_root = base_tree.getroot()
              base_packages = base_root.find('.//packages')

              if base_packages is None:
                  # Cobertura format
                  base_packages = base_root.find('packages')

              # Track merged data
              merged_files = {}

              def process_package(pkg):
                  """Extract file data from a package element.

                  Uses pkg.findall('.//class') to locate <class> elements
                  regardless of whether they're nested under <classes> (cobertura
                  default) or direct children of <package>. The previous
                  implementation tried to detect both via
                  `pkg.find('classes') or pkg.findall('class')` and a downstream
                  `hasattr(classes, '__iter__')` guard — but ElementTree's
                  Element type uses the legacy __getitem__ iteration protocol
                  (no __iter__ dunder), so the hasattr check returned False
                  whenever the cobertura <classes> wrapper was present, silently
                  skipping the entire merge. Result: coverage.xml was a copy of
                  shard-1's XML, and the threshold read shard-1's coverage in
                  isolation (~68-72%) instead of the true aggregate (~88%).
                  """
                  for cls in pkg.findall('.//class'):
                      filename = cls.get('filename')
                      if not filename:
                          continue
                      if filename not in merged_files:
                          merged_files[filename] = cls
                      else:
                          # Merge line coverage: OR the hits per line number,
                          # AND union the per-line branch coverage.
                          existing_lines = {l.get('number'): l for l in merged_files[filename].findall('.//line')}
                          for line in cls.findall('.//line'):
                              line_num = line.get('number')
                              if line_num in existing_lines:
                                  # Same line in both shards — take max hits (covered in any shard = covered)
                                  existing_hits = int(existing_lines[line_num].get('hits', 0))
                                  new_hits = int(line.get('hits', 0))
                                  existing_lines[line_num].set('hits', str(max(existing_hits, new_hits)))
                                  # Union branch coverage on the same line.
                                  merge_branch_attrs(existing_lines[line_num], line)
                              else:
                                  # Line only in the new shard — append to the merged class's <lines>
                                  lines_elem = merged_files[filename].find('lines')
                                  if lines_elem is not None:
                                      lines_elem.append(line)

              # Process all packages in base
              for pkg in base_root.findall('.//package'):
                  process_package(pkg)

              # Merge additional files
              for f in files[1:]:
                  try:
                      tree = ET.parse(f)
                      root = tree.getroot()
                      for pkg in root.findall('.//package'):
                          process_package(pkg)
                  except Exception as e:
                      print(f"Warning: Could not process {f}: {e}")

              # Recompute aggregate line-rate from merged <line> hits.
              # The merge above OR's hits across shards but the root <coverage>
              # element's line-rate/lines-valid/lines-covered attributes still
              # reflect shard-1's standalone values. Without this recomputation
              # the threshold check downstream reads shard-1's coverage in
              # isolation (~68-72%) instead of the true merged aggregate (~88%).
              # See PR #355 / CHANGELOG for the empirical investigation.
              total_lines = covered_lines = 0
              for line in base_root.findall('.//line'):
                  total_lines += 1
                  if int(line.get('hits', 0)) > 0:
                      covered_lines += 1
              if total_lines:
                  rate = covered_lines / total_lines
                  base_root.set('line-rate', f"{rate:.4f}")
                  base_root.set('lines-valid', str(total_lines))
                  base_root.set('lines-covered', str(covered_lines))
                  print(f"📊 Aggregate: {covered_lines}/{total_lines} lines covered = {rate * 100:.2f}%")

              # Recompute aggregate branch-rate from merged <line branch="true">
              # condition-coverage attributes. Each merged line has already had
              # its missing-branches set-intersected across shards by
              # merge_branch_attrs, so the per-line covered/total counts are
              # correct unions. Summing them gives the true aggregate. Without
              # this pass, branch-rate/branches-valid/branches-covered remain at
              # shard-1's standalone values (the same scope-limit that PR #357
              # left for line-rate's sibling attrs). The CI threshold check only
              # uses line-rate, so this is currently informational; if a future
              # branch-coverage threshold is added, it'll read true aggregates.
              total_branches = covered_branches = 0
              for line in base_root.findall('.//line'):
                  if line.get('branch') != 'true':
                      continue
                  cc = line.get('condition-coverage', '')
                  m = re.search(r'\((\d+)/(\d+)\)', cc)
                  if not m:
                      continue
                  covered_branches += int(m.group(1))
                  total_branches += int(m.group(2))
              if total_branches:
                  branch_rate = covered_branches / total_branches
                  base_root.set('branch-rate', f"{branch_rate:.4f}")
                  base_root.set('branches-valid', str(total_branches))
                  base_root.set('branches-covered', str(covered_branches))
                  print(f"📊 Branches: {covered_branches}/{total_branches} branches covered = {branch_rate * 100:.2f}%")

              # Write merged output
              base_tree.write(output, encoding='unicode', xml_declaration=True)
              print(f"✅ Merged {len(files)} coverage files into {output}")

          # Find and merge all shard coverage files
          coverage_files = sorted(glob.glob('coverage-shard-*.xml'))
          print(f"Found {len(coverage_files)} coverage files: {coverage_files}")
          merge_coverage_xml(coverage_files, 'coverage.xml')
          EOF

      - name: Verify coverage threshold
        run: |
          # Parse coverage.xml and check threshold
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import sys

          tree = ET.parse('coverage.xml')
          root = tree.getroot()

          # Get line-rate from coverage element
          line_rate = float(root.get('line-rate', 0))
          coverage_pct = line_rate * 100

          print(f"📊 Combined coverage: {coverage_pct:.1f}%")

          # CI threshold is 70% (excludes requires_tools/docker/smoke tests).
          # The aggregate XML merge in the previous step recomputes line-rate
          # from merged <line> hits, so this reads true aggregate coverage
          # rather than shard-1's standalone value (which was the source of
          # the spurious "drop from 71.6% to 68.7%" investigated in PR #355).
          # Full 85% coverage is still enforced via `make test` (sequential,
          # full suite without filtered markers).
          if coverage_pct < 70:
              print(f"❌ Coverage {coverage_pct:.1f}% is below 70% CI threshold")
              sys.exit(1)
          else:
              print(f"✅ Coverage {coverage_pct:.1f}% meets 70% CI threshold")
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true


  # Quick lint checks for PRs - formatters in check-only mode
  lint-quick:
    name: Lint (quick checks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade 'pip<25.3'
          pip install -r requirements-dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-

      - name: Run pre-commit (quick checks)
        env:
          # Don't set PRE_COMMIT_HOME: YAML env: passes ~ literally (no shell expansion),
          # so `~/.cache/pre-commit` becomes a literal directory under $PWD which defeats
          # the cache action and litters the repo root. Pre-commit's default
          # ($HOME/.cache/pre-commit on Linux) matches the cache action's path.
          # Skip formatters (black, ruff --fix, shfmt) - check-only via separate hooks
          SKIP: black,ruff,shfmt,bandit,mypy
        run: |
          # Run core linting hooks
          pre-commit run --all-files trailing-whitespace
          pre-commit run --all-files end-of-file-fixer
          pre-commit run --all-files check-yaml
          pre-commit run --all-files check-json
          pre-commit run --all-files check-toml
          pre-commit run --all-files mixed-line-ending
          pre-commit run --all-files detect-private-key
          pre-commit run --all-files check-added-large-files

      - name: Check Python formatting (black --check)
        run: |
          black --check scripts/ tests/

      - name: Check Python linting (ruff check)
        run: |
          ruff check scripts/ tests/

      - name: Check shell formatting (shfmt -d)
        run: |
          shfmt -d -i 2 -ci -bn scripts/dev/*.sh scripts/core/*.sh 2>/dev/null || true

  # Dashboard build smoke test — guards against silent breakage when dashboard
  # deps are bumped (Dependabot or otherwise). PR-time CI did not exercise the
  # dashboard build path historically; PR #456 (rollup-plugin-visualizer v7)
  # exposed this gap by showing CLEAN status while actually requiring Node 22
  # (CI was pinned to Node 20). Tracked in #461.
  #
  # Same pattern as tool-contract-tests: always runs (stable required-check
  # name for future branch protection), but only does real work when
  # scripts/dashboard/** actually changed. The build path uses `tsc && vite
  # build` per scripts/dashboard/package.json:"build", which is the same path
  # the release pipeline bundles, so build success here implies release
  # bundleability.
  dashboard-smoke:
    name: dashboard-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect dashboard changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            dashboard:
              - 'scripts/dashboard/**'

      - name: Set up Node.js 22
        if: steps.changes.outputs.dashboard == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/dashboard/package-lock.json

      - name: Install dashboard dependencies
        if: steps.changes.outputs.dashboard == 'true'
        working-directory: scripts/dashboard
        run: npm ci

      - name: Build dashboard (tsc && vite build)
        if: steps.changes.outputs.dashboard == 'true'
        working-directory: scripts/dashboard
        run: npm run build

      - name: Test dashboard (jest)
        if: steps.changes.outputs.dashboard == 'true'
        working-directory: scripts/dashboard
        run: npm test

      - name: Skip note (no dashboard changes)
        if: steps.changes.outputs.dashboard != 'true'
        run: echo "No scripts/dashboard/** changes detected; skipping dashboard build smoke."

  # Tool-output contract tests for PRs that bump tool versions.
  #
  # This job is a required status check for PRs labeled dependencies+automated
  # (see docs/RELEASE.md -> "Tool-Version Auto-Merge"). It must ALWAYS run
  # (so the required-check name stays stable for branch protection) but only
  # does real work when versions.yaml or Dockerfile.* changed — other PRs get
  # a trivial pass via the paths-filter step.
  #
  # Both the job key AND `name:` are pinned to `tool-contract-tests` so branch
  # protection can match the exact string without surprises.
  tool-contract-tests:
    name: tool-contract-tests
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect version-affecting changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            versions:
              - 'versions.yaml'
              - 'Dockerfile.*'
              - 'tests/integration/test_tool_contracts.py'

      - name: Set up Python 3.12
        if: steps.changes.outputs.versions == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        if: steps.changes.outputs.versions == 'true'
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools for contract tests
        if: steps.changes.outputs.versions == 'true'
        env:
          # Pinned to versions.yaml. Update both files together when bumping.
          TRIVY_VERSION: "0.70.0"
          TRUFFLEHOG_VERSION: "3.94.3"
          HADOLINT_VERSION: "2.14.0"
        run: |
          # Same install block as scheduled.yml:tool-contract-tests — kept in
          # sync manually. Any drift means the weekly and PR gates disagree.
          # All downloads pinned + hardened (--fail + retry + integrity)
          # to avoid the upstream install.sh GitHub API flake. See PR #350
          # and release.rules.md "CI install hardening".
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 600 \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          gzip -t /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          pip install semgrep bandit checkov
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 600 \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          v="$TRUFFLEHOG_VERSION"  # short alias to keep URL line under 140 chars
          curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 600 \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${v}/trufflehog_${v}_linux_amd64.tar.gz" \
            -o /tmp/trufflehog.tar.gz
          gzip -t /tmp/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /usr/local/bin trufflehog
          chmod +x /usr/local/bin/trufflehog
          sudo apt-get update && sudo apt-get install -y shellcheck

          echo "Installed tools:"
          trivy --version || echo "trivy not available"
          semgrep --version || echo "semgrep not available"
          bandit --version || echo "bandit not available"
          hadolint --version || echo "hadolint not available"
          trufflehog --version || echo "trufflehog not available"
          checkov --version || echo "checkov not available"
          shellcheck --version || echo "shellcheck not available"

      - name: Run tool contract tests
        if: steps.changes.outputs.versions == 'true'
        env:
          CI: "true"
        run: |
          pytest tests/integration/test_tool_contracts.py \
            -v \
            -m "requires_tools" \
            --tb=short \
            --timeout=300

      - name: Summarize skip
        if: steps.changes.outputs.versions != 'true'
        run: |
          echo "No version-affecting files changed — contract tests not required."
          echo "Paths watched: versions.yaml, Dockerfile.*, tests/integration/test_tool_contracts.py"
