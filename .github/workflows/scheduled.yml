---
name: Scheduled Tests

# Consolidated scheduled test workflows
# Merged from: nightly-tests.yml, e2e-comprehensive-tests.yml, performance-regression.yml,
#              docker-validation.yml
#
# Schedule:
#   - 2AM UTC daily: Nightly extended tests
#   - 4AM UTC weekdays: E2E comprehensive tests
#   - 3AM UTC Sunday: Docker variant validation
#
# Manual dispatch allows running any test suite on demand

on:
  schedule:
    - cron: '0 2 * * *'   # 2AM UTC daily - nightly tests
    - cron: '0 4 * * 1-5' # 4AM UTC Mon-Fri - E2E tests
    - cron: '0 3 * * 0'   # 3AM UTC Sunday - Docker validation
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: Manual test execution requires task selection for targeted testing
    inputs:
      task:
        description: 'Which test suite to run'
        type: choice
        options:
          - nightly
          - e2e
          - performance
          - docker
          - all
        default: 'all'

permissions:
  contents: read
  issues: write
  packages: read
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jimmy058910/jmo-security

# ==============================================================================
# NIGHTLY TESTS - Extended test suite with security audits
# Runs daily at 2AM UTC or on manual dispatch
# ==============================================================================
jobs:
  nightly-extended-tests:
    name: Nightly Extended Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          pip install bandit

      - name: Run full test suite (including slow tests)
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --durations=20 \
            --maxfail=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: nightly
          name: nightly-coverage

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/ -v --tb=short || echo "Performance tests completed with warnings"

      - name: Run security audit
        run: |
          echo "Running security audit..."
          bandit -r scripts/ -c pyproject.toml

          echo ""
          echo "Scanning for secrets..."
          set -euo pipefail
          if ! trufflehog filesystem . --json --exclude-paths .trufflehog-exclude.txt \
              --only-verified > trufflehog-results.json 2>trufflehog-stderr.txt; then
            EXIT_CODE=$?
            echo "::error::TruffleHog exited with code ${EXIT_CODE}"
            cat trufflehog-stderr.txt >&2
            exit "${EXIT_CODE}"
          fi

          if [ ! -s trufflehog-results.json ]; then
            echo "Security audit complete. Verified secrets: 0"
          else
            VERIFIED=$({ jq -r 'select(.Verified == true)' trufflehog-results.json || true; } | wc -l)
            if [ "$VERIFIED" -gt 0 ]; then
              echo "::error::Found $VERIFIED verified secrets!"
              exit 1
            fi
            echo "Security audit complete. Verified secrets: $VERIFIED"
          fi

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-results-${{ github.run_id }}
          path: |
            htmlcov/
            coverage.xml
            trufflehog-results.json
          retention-days: 7

  nightly-cross-platform:
    name: Cross-Platform Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run unit tests
        shell: bash
        run: |
          pytest tests/unit/ \
            --cov=scripts \
            --cov-report=term-missing \
            -v \
            --maxfail=5

      - name: Run CLI tests
        shell: bash
        run: |
          pytest tests/cli/ -v --maxfail=5

  nightly-security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run security regression test suite
        run: |
          pytest \
            tests/cli/test_path_sanitizers.py \
            tests/unit/test_archive_security.py \
            tests/unit/test_history_db_performance.py \
            -v --tb=short

      - name: Run path traversal fuzz tests
        run: |
          pytest tests/cli/test_path_sanitizers.py::TestPathTraversalFuzzing -v

  nightly-docker-smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (balanced variant)
        run: |
          docker build -t jmo-security:nightly-test -f Dockerfile.balanced .

      - name: Test Docker image --help
        run: |
          docker run --rm jmo-security:nightly-test --help

      - name: Test Docker scan command
        run: |
          docker run --rm jmo-security:nightly-test scan --help

      - name: Scan test repository with Docker
        run: |
          mkdir -p test-repo results
          # Container runs as non-root USER jmo (UID 1000). The GitHub runner
          # creates these directories as the runner user (UID 1001), so jmo
          # cannot write to /results without a permission grant.
          chmod 777 test-repo results
          echo "print('test')" > test-repo/test.py
          docker run --rm \
            -v "$PWD/test-repo:/scan" \
            -v "$PWD/results:/results" \
            jmo-security:nightly-test scan \
              --repo /scan \
              --results-dir /results \
              --allow-missing-tools

  # Tool smoke tests: verify each tool completes within timeout and produces valid output
  # Catches hangs (like cdxgen 9+ min) and tool regressions before they affect users
  tool-smoke-tests:
    name: Tool Smoke Tests (Juice-Shop Fixture)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # Run on 2AM nightly schedule OR manual nightly/all dispatch
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install balanced profile tools
        run: |
          # Install tools needed for smoke tests
          # Core SAST/SCA tools
          pip install semgrep checkov

          # Trivy - vulnerability scanner
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # Grype - SCA
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

          # Syft - SBOM
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          # TruffleHog - secrets
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Hadolint - Dockerfile linter
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

          # ShellCheck - shell linter
          sudo apt-get update && sudo apt-get install -y shellcheck

          # cdxgen - SBOM generator (test for hangs)
          npm install -g @cyclonedx/cdxgen

          # Verify installations
          echo "Installed tools:"
          semgrep --version || echo "semgrep not available"
          trivy --version || echo "trivy not available"
          grype version || echo "grype not available"
          syft version || echo "syft not available"
          trufflehog --version || echo "trufflehog not available"
          hadolint --version || echo "hadolint not available"
          shellcheck --version || echo "shellcheck not available"
          cdxgen --version || echo "cdxgen not available"
          checkov --version || echo "checkov not available"

      - name: Run tool smoke tests
        run: |
          # Run smoke tests with timeout enforcement
          # Each tool has its own timeout, pytest-timeout is safety net
          pytest tests/integration/test_tool_smoke.py \
            -v \
            -m "smoke" \
            --tb=short \
            --timeout=300 \
            --maxfail=5
        env:
          CI: "true"

      - name: Upload smoke test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tool-smoke-results-${{ github.run_id }}
          path: |
            .pytest_cache/
            *.log
          retention-days: 7

  # Full pre-commit lint suite - nightly only (moved from ci.yml)
  lint-full:
    name: Lint (full pre-commit suite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade 'pip<25.3'
          pip install -r requirements-dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-

      - name: Run pre-commit (full suite, all hooks)
        env:
          PRE_COMMIT_HOME: ~/.cache/pre-commit
          # Skip bandit (already covered by make lint)
          # Skip yamllint to avoid validating external pre-commit cache files
          SKIP: bandit,yamllint
        run: |
          pre-commit run --all-files --show-diff-on-failure
          # Run yamllint separately on our repo files only
          yamllint -c .yamllint.yaml .

  # ==============================================================================
  # INTEGRATION TESTS - Nightly only (moved from ci.yml)
  # Tests scan pipeline, deduplication, and tool integration
  # ==============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install minimal security tools
        run: |
          # Install semgrep for SAST testing
          pip install semgrep
          # Install trufflehog for secrets testing
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Run integration tests (not slow)
        run: |
          python -m pytest tests/integration/ \
            -v \
            -m "integration and not slow" \
            --tb=short \
            --durations=10

      - name: Run deduplication accuracy tests
        run: |
          python -m pytest tests/integration/test_dedup_accuracy.py \
            -v \
            --tb=short

  nightly-notify-failure:
    name: Notify on Nightly Failure
    runs-on: ubuntu-latest
    needs:
      - nightly-extended-tests
      - nightly-cross-platform
      - nightly-security-regression
      - nightly-docker-smoke
      - tool-smoke-tests
      - lint-full
      - integration-tests
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `Nightly test suite failed on ${today}`;

            const body = `## Nightly Test Failure

            The nightly test suite failed. Please investigate and fix.

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Troubleshooting:**
            1. Check workflow logs for specific failures
            2. Run tests locally: \`pytest tests/ -v\`
            3. Check for flaky tests or environmental issues
            4. Review recent commits for potential breaking changes
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-test-failure'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'ci', 'nightly-test-failure']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Nightly tests failed again on ${today}.\n\n` +
                  `Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              });
            }

# ==============================================================================
# E2E COMPREHENSIVE TESTS - Full integration tests
# Runs weekdays at 4AM UTC or on manual dispatch
# ==============================================================================
  e2e-ubuntu:
    name: E2E Ubuntu Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt
          jmo --help || echo "jmo CLI not available"

      - name: Install external security tools
        run: |
          make tools || echo "Some tools failed to install, continuing..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pull Docker test images
        run: |
          docker pull alpine:3.19
          docker pull nginx:alpine
          docker pull redis:alpine

      - name: Run comprehensive test suite
        id: run_tests
        run: |
          echo "Running full Ubuntu + Advanced test suite"
          RESULTS_DIR="/tmp/jmo-e2e-results-${{ github.run_id }}"
          mkdir -p "$RESULTS_DIR"
          python -m pytest tests/e2e/ -v --timeout=300 \
            --ignore=tests/e2e/test_linux_specific.py \
            --ignore=tests/e2e/test_macos_specific.py \
            --ignore=tests/e2e/test_windows_specific.py \
            -m "not docker" \
            --json-report \
            --json-report-file="$RESULTS_DIR/pytest-report.json" \
            2>&1 | tee "$RESULTS_DIR/test.log"
        env:
          TEST_REPO: https://github.com/juice-shop/juice-shop.git
          TEST_IMAGE: alpine:3.19
          TEST_URL: http://testphp.vulnweb.com
          RESULTS_BASE: /tmp/jmo-e2e-results-${{ github.run_id }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ubuntu-results-${{ github.run_id }}
          path: |
            /tmp/jmo-e2e-results-${{ github.run_id }}/pytest-report.json
            /tmp/jmo-e2e-results-${{ github.run_id }}/test.log
          retention-days: 30

      - name: Check test success
        if: always()
        run: |
          RESULTS_DIR="/tmp/jmo-e2e-results-${{ github.run_id }}"
          if [[ -f "$RESULTS_DIR/pytest-report.json" ]]; then
            REPORT="$RESULTS_DIR/pytest-report.json"
            FAILED_TESTS=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r['summary'].get('failed',0))")
            if [[ $FAILED_TESTS -gt 0 ]]; then
              echo "$FAILED_TESTS tests failed"
              exit 1
            else
              echo "All tests passed"
            fi
          else
            echo "No test results found"
            exit 1
          fi

  e2e-macos:
    name: E2E macOS Tests
    runs-on: macos-14
    timeout-minutes: 120
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install external security tools via Homebrew
        run: |
          brew install semgrep trivy syft checkov hadolint || echo "Some tools failed"

      - name: Run macOS test suite
        run: |
          RESULTS_DIR="/tmp/jmo-e2e-results-${{ github.run_id }}"
          mkdir -p "$RESULTS_DIR"
          python -m pytest tests/e2e/ -v --timeout=300 \
            --ignore=tests/e2e/test_linux_specific.py \
            --ignore=tests/e2e/test_windows_specific.py \
            -m "not docker" \
            --json-report \
            --json-report-file="$RESULTS_DIR/pytest-report.json" \
            2>&1 | tee "$RESULTS_DIR/test.log"
        env:
          TEST_REPO: https://github.com/juice-shop/juice-shop.git
          TEST_IMAGE: alpine:3.19
          RESULTS_BASE: /tmp/jmo-e2e-results-${{ github.run_id }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-macos-results-${{ github.run_id }}
          path: |
            /tmp/jmo-e2e-results-${{ github.run_id }}/pytest-report.json
            /tmp/jmo-e2e-results-${{ github.run_id }}/test.log
          retention-days: 30

  e2e-tool-integration:
    name: E2E Tool Integration Tests (requires_tools)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools for integration tests
        run: |
          # Semgrep - for SQL injection detection tests
          pip install semgrep

          # Trivy - for CVE detection tests
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # TruffleHog - for secret detection tests
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Checkov - for IaC tests
          pip install checkov

          # Verify installations
          echo "Installed tools:"
          semgrep --version || echo "semgrep not available"
          trivy --version || echo "trivy not available"
          trufflehog --version || echo "trufflehog not available"
          checkov --version || echo "checkov not available"

      - name: Run requires_tools integration tests
        run: |
          # Run tests that require actual security tools
          # These tests validate real tool detection (SQL injection, CVEs, secrets)
          pytest tests/e2e/test_real_tool_scans.py \
            -v \
            -m "requires_tools" \
            --tb=short \
            --maxfail=3 \
            --timeout=300
        env:
          CI: "true"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-tool-integration-results-${{ github.run_id }}
          path: |
            .pytest_cache/
            *.log
          retention-days: 7

  # Contract tests: verify tool output formats haven't changed
  # These catch upstream breaking changes in security tool output structures
  tool-contract-tests:
    name: Tool Output Contract Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools for contract tests
        run: |
          # Install tools needed for contract validation
          # Trivy - vulnerability scanner
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # Semgrep - SAST scanner
          pip install semgrep

          # Bandit - Python security linter
          pip install bandit

          # Hadolint - Dockerfile linter
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

          # TruffleHog - secrets scanner
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Checkov - IaC scanner
          pip install checkov

          # ShellCheck - shell script linter
          sudo apt-get update && sudo apt-get install -y shellcheck

          # Verify installations
          echo "Installed tools:"
          trivy --version || echo "trivy not available"
          semgrep --version || echo "semgrep not available"
          bandit --version || echo "bandit not available"
          hadolint --version || echo "hadolint not available"
          trufflehog --version || echo "trufflehog not available"
          checkov --version || echo "checkov not available"
          shellcheck --version || echo "shellcheck not available"

      - name: Run tool contract tests
        run: |
          # Contract tests verify tool output formats match adapter expectations
          # This catches upstream breaking changes before they cause silent failures
          pytest tests/integration/test_tool_contracts.py \
            -v \
            -m "requires_tools" \
            --tb=short \
            --timeout=300
        env:
          CI: "true"

      - name: Upload contract test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: contract-test-results-${{ github.run_id }}
          path: |
            .pytest_cache/
          retention-days: 7

  e2e-visual:
    name: E2E Visual Dashboard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-jmo

      - name: Install Playwright
        run: |
          pip install pytest-playwright
          playwright install chromium --with-deps

      - name: Run visual tests
        run: make test-e2e-visual

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-test-screenshots-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-ubuntu, e2e-macos, e2e-tool-integration, tool-contract-tests, e2e-visual]
    if: |
      always() && (
        github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
        github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
      )
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-*-results-*
          path: test-results

      - name: Aggregate results
        run: |
          {
            echo "## E2E Test Summary"
            echo ""
          } > summary.md

          get_field() {
            python3 -c \
              "import json,sys; r=json.load(open(sys.argv[1])); \
               print(r.get('summary',{}).get(sys.argv[2],0))" \
              "$1" "$2" 2>/dev/null || echo 0
          }

          for report_file in test-results/*/pytest-report.json; do
            if [[ -f "$report_file" ]]; then
              job=$(dirname "$report_file" | xargs basename \
                | sed 's/-results-.*//' | sed 's/e2e-//')

              total=$(get_field "$report_file" total)
              passed=$(get_field "$report_file" passed)
              failed=$(get_field "$report_file" failed)
              skipped=$(get_field "$report_file" skipped)

              {
                echo "### $job Results"
                echo "- Total: $total"
                echo "- Passed: $passed"
                echo "- Failed: $failed"
                echo "- Skipped: $skipped"
                echo ""
              } >> summary.md
            fi
          done

          cat summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-summary-${{ github.run_id }}
          path: summary.md
          retention-days: 90

# ==============================================================================
# PERFORMANCE TESTS - Benchmark comparison
# Only runs on manual dispatch (PR benchmarks handled in ci.yml)
# ==============================================================================
  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only manual trigger (PR-based performance testing handled in ci.yml)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'performance' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements-dev.txt
          pip install psutil

      - name: Run baseline benchmarks (main branch)
        id: perf-tests
        continue-on-error: true
        run: |
          git checkout main
          python3 -m pytest tests/performance/test_benchmarks.py \
            -v \
            --benchmark-only \
            --benchmark-json=baseline-results.json

      - name: Warn on performance regression
        if: steps.perf-tests.outcome == 'failure'
        run: |
          echo "::warning::Performance benchmarks failed. Review nightly logs for regressions."

      - name: Checkout current branch
        run: |
          git checkout ${{ github.sha }}

      - name: Run current benchmarks
        id: current
        run: |
          python3 -m pytest tests/performance/test_benchmarks.py \
            -v \
            -m benchmark \
            --tb=short \
            --benchmark-json=current-results.json

      - name: Compare results and detect regressions
        id: compare
        run: |
          python3 scripts/dev/compare_benchmarks.py \
            --baseline baseline-results.json \
            --current current-results.json \
            --threshold 20 \
            --output benchmark-comparison.md
        continue-on-error: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            baseline-results.json
            current-results.json
            benchmark-comparison.md
          retention-days: 30

      - name: Fail on performance regression
        if: steps.compare.outputs.regression_detected == 'true'
        run: |
          echo "Performance regression detected! See benchmark-comparison.md for details."
          exit 1

# ==============================================================================
# DOCKER VALIDATION - Validates JMo Security Docker image variants
# Runs weekly Sunday at 3AM UTC or on manual dispatch (task=docker or task=all)
# ==============================================================================
  validate-variants:
    name: Validate ${{ matrix.variant }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # expected_tools is the number of tools ACTUALLY in the Docker image
          # (on amd64). For fast/slim/balanced, that equals PROFILE_TOOLS in
          # scripts/core/tool_registry.py. For deep, subtract the 4 tools in
          # MANUAL_INSTALL_TOOLS (akto, afl++, mobsf, falco) which are listed
          # in PROFILE_TOOLS["deep"] but intentionally not in the image —
          # users install them manually (see docs/MANUAL_INSTALLATION.md).
          - variant: deep
            expected_tools: 25   # 29 profile - 4 manual-only = 25
            profile: deep
          - variant: balanced
            expected_tools: 18
            profile: balanced
          - variant: slim
            expected_tools: 14
            profile: slim
          - variant: fast
            expected_tools: 9
            profile: fast
    # Run on Sunday 3AM schedule OR manual docker/all dispatch
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'docker' || github.event.inputs.task == 'all')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}

      - name: Verify tool installation
        id: tools
        run: |
          echo "Checking tools in ${{ matrix.variant }} variant..."
          # --profile is required: without it, `tools check --json` emits a dict of
          # profile summaries where `installed` is an integer count, not a per-tool
          # boolean — the jq filter below would then match zero entries (jq is
          # strictly typed: `7 == true` is false).
          # Capture stderr separately so a silent-exit bug (zero stdout, non-zero rc)
          # emits a diagnosable error to the job log instead of just "exit code 1".
          if ! docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }} \
              tools check --profile ${{ matrix.profile }} --json \
              > tools-check.json 2>tools-check.stderr.log; then
            rc=$?
            echo "::error::tools check --profile ${{ matrix.profile }} exited with rc=$rc"
            echo "--- stderr ---"
            cat tools-check.stderr.log
            echo "--- stdout (tools-check.json) ---"
            cat tools-check.json
            exit "$rc"
          fi

          # Count installed tools (expected JSON shape: {tool_name: {installed: bool, ...}})
          INSTALLED=$(cat tools-check.json | jq '[.[] | select(.installed == true)] | length')
          echo "installed_count=$INSTALLED" >> $GITHUB_OUTPUT

          echo "Installed tools: $INSTALLED (expected: ${{ matrix.expected_tools }})"

          if [ "$INSTALLED" -lt ${{ matrix.expected_tools }} ]; then
            echo "::error::Tool count $INSTALLED is less than expected ${{ matrix.expected_tools }}"
            echo "Missing tools:"
            cat tools-check.json | jq -r 'to_entries[] | select(.value.installed == false) | .key'
            exit 1
          fi

      - name: Test scan capability
        run: |
          # Create sample vulnerable code
          mkdir -p /tmp/test-repo/src
          cat > /tmp/test-repo/src/app.js << 'EOF'
          const userId = req.query.id;
          const query = "SELECT * FROM users WHERE id = " + userId;
          EOF
          # UID mismatch fix: GitHub runner is UID 1001, container USER jmo
          # is UID 1000. Bind mounts preserve host UID, so without this chmod
          # the container can't write /scan/results (PermissionError [Errno 13]).
          # Safe because the mount source is a run-scoped tmp directory.
          chmod 777 /tmp/test-repo

      - name: Run scan
        id: docker-scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v /tmp/test-repo:/scan \
            -w /scan \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }} \
            scan --repo . --profile ${{ matrix.profile }} --results-dir /scan/results

      - name: Verify scan results
        run: |
          if [ "${{ steps.docker-scan.outcome }}" == "failure" ]; then
            echo "::error::Docker scan for ${{ matrix.variant }} failed"
            exit 1
          fi
          if [ ! -d /tmp/test-repo/results ]; then
            echo "::error::Scan completed but produced no results directory"
            exit 1
          fi
          echo "Scan completed successfully"
          ls -la /tmp/test-repo/results

      - name: Test help command
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }} --help

      - name: Test version command
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }} --version

      - name: Upload tools check results
        uses: actions/upload-artifact@v7
        with:
          name: tools-check-${{ matrix.variant }}
          path: tools-check.json
          retention-days: 30

  # ==============================================================================
  # DOCKER VALIDATION SUMMARY
  # Reports overall Docker variant validation status
  # ==============================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: validate-variants
    if: |
      always() && (
        github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0' ||
        github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'docker' || github.event.inputs.task == 'all')
      )
    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate-variants.result }}" == "failure" ]; then
            echo "::error::One or more Docker variants failed validation"
            exit 1
          fi
          echo "All Docker variants validated successfully"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: tools-check-*
          path: artifacts

      - name: Generate summary
        run: |
          echo "# Docker Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Status | Tools |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY

          for variant in deep balanced slim fast; do
            if [ -f "artifacts/tools-check-$variant/tools-check.json" ]; then
              TOOLS=$(cat "artifacts/tools-check-$variant/tools-check.json" | jq '[.[] | select(.installed == true)] | length')
              echo "| $variant | :white_check_mark: | $TOOLS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $variant | :x: | N/A |" >> $GITHUB_STEP_SUMMARY
            fi
          done
