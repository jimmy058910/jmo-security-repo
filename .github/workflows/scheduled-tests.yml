---
name: Scheduled Tests

# Consolidated scheduled test workflows
# Merged from: nightly-tests.yml, e2e-comprehensive-tests.yml, performance-regression.yml
#
# Schedule:
#   - 2AM UTC daily: Nightly extended tests
#   - 4AM UTC weekdays: E2E comprehensive tests
#
# Manual dispatch allows running any test suite on demand

on:
  schedule:
    - cron: '0 2 * * *'   # 2AM UTC daily - nightly tests
    - cron: '0 4 * * 1-5' # 4AM UTC Mon-Fri - E2E tests
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: Manual test execution requires task selection for targeted testing
    inputs:
      task:
        description: 'Which test suite to run'
        type: choice
        options:
          - nightly
          - e2e
          - performance
          - all
        default: 'all'

permissions:
  contents: read
  issues: write
  pull-requests: write

# ==============================================================================
# NIGHTLY TESTS - Extended test suite with security audits
# Runs daily at 2AM UTC or on manual dispatch
# ==============================================================================
jobs:
  nightly-extended-tests:
    name: Nightly Extended Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          pip install bandit

      - name: Run full test suite (including slow tests)
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --durations=20 \
            --maxfail=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: nightly
          name: nightly-coverage

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/ -v --tb=short || echo "Performance tests completed with warnings"

      - name: Run security audit
        run: |
          echo "Running security audit..."
          bandit -r scripts/ -c bandit.yaml

          echo ""
          echo "Scanning for secrets..."
          trufflehog filesystem . --json --exclude-paths .trufflehog-exclude.txt > trufflehog-results.json || true

          VERIFIED=$(jq -r 'select(.Verified == true)' trufflehog-results.json 2>/dev/null | wc -l || echo "0")
          if [ "$VERIFIED" -gt 0 ]; then
            echo "Found $VERIFIED verified secrets!"
            exit 1
          else
            echo "No verified secrets found"
          fi

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-test-results-${{ github.run_id }}
          path: |
            htmlcov/
            coverage.xml
            trufflehog-results.json
          retention-days: 7

  nightly-cross-platform:
    name: Cross-Platform Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=scripts \
            --cov-report=term-missing \
            -v \
            --maxfail=5

      - name: Run CLI tests
        run: |
          pytest tests/cli/ -v --maxfail=5

  nightly-security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run security regression test suite
        run: |
          pytest tests/e2e/test_security_hardening.py -v --tb=short

      - name: Run SQL injection tests
        run: |
          pytest tests/e2e/test_security_hardening.py::TestSQLInjectionPrevention -v

      - name: Run path traversal tests
        run: |
          pytest tests/e2e/test_security_hardening.py::TestPathTraversalPrevention -v

  nightly-docker-smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    # Run on 2AM schedule OR manual nightly/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'nightly' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (balanced variant)
        run: |
          docker build -t jmo-security:nightly-test -f Dockerfile.balanced .

      - name: Test Docker image --help
        run: |
          docker run --rm jmo-security:nightly-test --help

      - name: Test Docker scan command
        run: |
          docker run --rm jmo-security:nightly-test scan --help

      - name: Scan test repository with Docker
        run: |
          mkdir -p test-repo results
          echo "print('test')" > test-repo/test.py
          docker run --rm \
            -v "$PWD/test-repo:/scan" \
            -v "$PWD/results:/results" \
            jmo-security:nightly-test scan \
              --repo /scan \
              --results-dir /results \
              --allow-missing-tools

  nightly-notify-failure:
    name: Notify on Nightly Failure
    runs-on: ubuntu-latest
    needs: [nightly-extended-tests, nightly-cross-platform, nightly-security-regression, nightly-docker-smoke]
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `Nightly test suite failed on ${today}`;

            const body = `## Nightly Test Failure

            The nightly test suite failed. Please investigate and fix.

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Troubleshooting:**
            1. Check workflow logs for specific failures
            2. Run tests locally: \`pytest tests/ -v\`
            3. Check for flaky tests or environmental issues
            4. Review recent commits for potential breaking changes
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-test-failure'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'ci', 'nightly-test-failure']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Nightly tests failed again on ${today}.\n\n` +
                  `Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              });
            }

# ==============================================================================
# E2E COMPREHENSIVE TESTS - Full integration tests
# Runs weekdays at 4AM UTC or on manual dispatch
# ==============================================================================
  e2e-ubuntu:
    name: E2E Ubuntu Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install JMo Security
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          jmo --help || echo "jmo CLI not available"

      - name: Install external security tools
        run: |
          make tools || echo "Some tools failed to install, continuing..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull Docker test images
        run: |
          docker pull alpine:3.19
          docker pull nginx:alpine
          docker pull redis:alpine

      - name: Setup test fixtures
        run: |
          bash tests/e2e/fixtures/setup_fixtures.sh

      - name: Run comprehensive test suite
        id: run_tests
        run: |
          echo "Running full Ubuntu + Advanced test suite"
          bash tests/e2e/run_comprehensive_tests.sh
        env:
          TEST_REPO: https://github.com/juice-shop/juice-shop.git
          TEST_IMAGE: alpine:3.19
          TEST_URL: http://testphp.vulnweb.com
          RESULTS_BASE: /tmp/jmo-e2e-results-${{ github.run_id }}
        continue-on-error: true

      - name: Generate test report
        if: always()
        run: |
          if [[ -f /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv ]]; then
            python tests/e2e/generate_report.py /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv
          else
            echo "No test results found"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-ubuntu-results-${{ github.run_id }}
          path: |
            /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv
            /tmp/jmo-e2e-results-${{ github.run_id }}/*/test.log
            /tmp/jmo-e2e-results-${{ github.run_id }}/*/summaries/findings.json
            /tmp/jmo-e2e-results-${{ github.run_id }}/*/summaries/SUMMARY.md
          retention-days: 30

      - name: Check test success
        if: always()
        run: |
          if [[ -f /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv ]]; then
            FAILED_TESTS=$(grep -c ",FAIL," /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv || echo 0)
            if [[ $FAILED_TESTS -gt 0 ]]; then
              echo "$FAILED_TESTS tests failed"
              exit 1
            else
              echo "All tests passed"
            fi
          else
            echo "No test results found"
            exit 1
          fi

  e2e-macos:
    name: E2E macOS Tests
    runs-on: macos-14
    timeout-minutes: 120
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install JMo Security
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .

      - name: Install external security tools via Homebrew
        run: |
          brew install semgrep trivy syft checkov hadolint || echo "Some tools failed"

      - name: Setup test fixtures
        run: |
          bash tests/e2e/fixtures/setup_fixtures.sh

      - name: Run macOS test suite
        run: |
          bash tests/e2e/run_comprehensive_tests.sh
        env:
          TEST_REPO: https://github.com/juice-shop/juice-shop.git
          TEST_IMAGE: alpine:3.19
          RESULTS_BASE: /tmp/jmo-e2e-results-${{ github.run_id }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-macos-results-${{ github.run_id }}
          path: |
            /tmp/jmo-e2e-results-${{ github.run_id }}/test-results.csv
            /tmp/jmo-e2e-results-${{ github.run_id }}/*/test.log
          retention-days: 30

  e2e-tool-integration:
    name: E2E Tool Integration Tests (requires_tools)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools for integration tests
        run: |
          # Semgrep - for SQL injection detection tests
          pip install semgrep

          # Trivy - for CVE detection tests
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # TruffleHog - for secret detection tests
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Checkov - for IaC tests
          pip install checkov

          # Verify installations
          echo "Installed tools:"
          semgrep --version || echo "semgrep not available"
          trivy --version || echo "trivy not available"
          trufflehog --version || echo "trufflehog not available"
          checkov --version || echo "checkov not available"

      - name: Run requires_tools integration tests
        run: |
          # Run tests that require actual security tools
          # These tests validate real tool detection (SQL injection, CVEs, secrets)
          pytest tests/e2e/test_real_tool_scans.py \
            -v \
            -m "requires_tools" \
            --tb=short \
            --maxfail=3 \
            --timeout=300
        env:
          CI: "true"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-tool-integration-results-${{ github.run_id }}
          path: |
            .pytest_cache/
            *.log
          retention-days: 7

  # Contract tests: verify tool output formats haven't changed
  # These catch upstream breaking changes in security tool output structures
  tool-contract-tests:
    name: Tool Output Contract Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # Run on 4AM weekday schedule OR manual e2e/all selection
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install JMo Security and test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Install security tools for contract tests
        run: |
          # Install tools needed for contract validation
          # Trivy - vulnerability scanner
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # Semgrep - SAST scanner
          pip install semgrep

          # Bandit - Python security linter
          pip install bandit

          # Hadolint - Dockerfile linter
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

          # TruffleHog - secrets scanner
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Checkov - IaC scanner
          pip install checkov

          # ShellCheck - shell script linter
          sudo apt-get update && sudo apt-get install -y shellcheck

          # Verify installations
          echo "Installed tools:"
          trivy --version || echo "trivy not available"
          semgrep --version || echo "semgrep not available"
          bandit --version || echo "bandit not available"
          hadolint --version || echo "hadolint not available"
          trufflehog --version || echo "trufflehog not available"
          checkov --version || echo "checkov not available"
          shellcheck --version || echo "shellcheck not available"

      - name: Run tool contract tests
        run: |
          # Contract tests verify tool output formats match adapter expectations
          # This catches upstream breaking changes before they cause silent failures
          pytest tests/integration/test_tool_contracts.py \
            -v \
            -m "requires_tools" \
            --tb=short \
            --timeout=300
        env:
          CI: "true"

      - name: Upload contract test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: contract-test-results-${{ github.run_id }}
          path: |
            .pytest_cache/
          retention-days: 7

  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-ubuntu, e2e-tool-integration]
    if: |
      always() && (
        github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1-5' ||
        github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'e2e' || github.event.inputs.task == 'all')
      )
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v5
        with:
          pattern: e2e-*-results-*
          path: test-results

      - name: Aggregate results
        run: |
          {
            echo "## E2E Test Summary"
            echo ""
          } > summary.md

          for results_file in test-results/*/test-results.csv; do
            if [[ -f "$results_file" ]]; then
              os=$(dirname "$results_file" | xargs basename | cut -d'-' -f2)

              total=$(($(wc -l < "$results_file") - 1))
              passed=$(grep -c ",PASS," "$results_file" || echo 0)
              failed=$(grep -c ",FAIL," "$results_file" || echo 0)
              skipped=$(grep -c ",SKIP," "$results_file" || echo 0)

              {
                echo "### $os Results"
                echo "- Total: $total"
                echo "- Passed: $passed"
                echo "- Failed: $failed"
                echo "- Skipped: $skipped"
                echo ""
              } >> summary.md
            fi
          done

          cat summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v5
        with:
          name: e2e-test-summary-${{ github.run_id }}
          path: summary.md
          retention-days: 90

# ==============================================================================
# PERFORMANCE TESTS - Benchmark comparison
# Only runs on manual dispatch (PR benchmarks handled in ci.yml)
# ==============================================================================
  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only manual trigger (PR-based performance testing handled in ci.yml)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'performance' || github.event.inputs.task == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements-dev.txt
          pip install psutil

      - name: Run baseline benchmarks (main branch)
        id: baseline
        run: |
          git checkout main
          python3 -m pytest tests/performance/test_benchmarks.py \
            -v \
            --benchmark-only \
            --benchmark-json=baseline-results.json \
            || true
        continue-on-error: true

      - name: Checkout current branch
        run: |
          git checkout ${{ github.sha }}

      - name: Run current benchmarks
        id: current
        run: |
          python3 -m pytest tests/performance/test_benchmarks.py \
            -v \
            -m benchmark \
            --tb=short \
            --benchmark-json=current-results.json

      - name: Compare results and detect regressions
        id: compare
        run: |
          python3 scripts/dev/compare_benchmarks.py \
            --baseline baseline-results.json \
            --current current-results.json \
            --threshold 20 \
            --output benchmark-comparison.md
        continue-on-error: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            baseline-results.json
            current-results.json
            benchmark-comparison.md
          retention-days: 30

      - name: Fail on performance regression
        if: steps.compare.outputs.regression_detected == 'true'
        run: |
          echo "Performance regression detected! See benchmark-comparison.md for details."
          exit 1
