---
name: Repository Maintenance

# Consolidated maintenance workflows
# Merged from: repo-completeness-check.yml, weekly-tool-update.yml, version-check.yml
#
# Schedule:
#   - 00:00 UTC Sunday: Weekly tool updates (auto-update-tools)
#   - 02:00 UTC Sunday: Version consistency checks (check-versions + related)
#   - 06:00 UTC Monday: Weekly repository analysis (repo-completeness)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Sunday 00:00 UTC - tool updates
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC - version checks
    - cron: '0 6 * * 1'  # Monday 06:00 UTC - repo completeness
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: false
        default: 'all'
        type: choice
        options: [all, tool-update, version-check, completeness]
      create_issues:
        description: 'Create GitHub issues for outdated tools (version-check task only)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── Tool Update ──────────────────────────────────────────────────────────────
  # Runs: Sunday 00:00 UTC (schedule) OR manual dispatch with task=tool-update/all
  auto-update-tools:
    name: Auto-update all security tools
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'tool-update' || github.event.inputs.task == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml requests packaging pre-commit

      - name: Check for tool updates
        id: check
        run: |
          echo "Checking for available tool updates..."
          python3 scripts/dev/update_versions.py --check-latest > check_output.txt || true
          cat check_output.txt

          # Check if any updates are available
          if grep -q "UPDATE AVAILABLE" check_output.txt; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
            echo "Updates available"
          else
            echo "updates_available=false" >> "$GITHUB_OUTPUT"
            echo "All tools already up-to-date"
          fi

      - name: Update all tools to latest versions
        if: steps.check.outputs.updates_available == 'true'
        run: |
          echo "Updating all tools to latest versions..."
          python3 scripts/dev/update_versions.py --update-all

          echo ""
          echo "Syncing changes to Dockerfiles..."
          python3 scripts/dev/update_versions.py --sync

      - name: Update pre-commit hooks
        run: |
          echo "Updating pre-commit hook versions..."
          pre-commit autoupdate

          # Apply any formatting changes from updated hooks
          pre-commit run --all-files || true

      - name: Commit changes
        id: commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch for updates
          BRANCH="auto-update-deps-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Stage changes
          git add versions.yaml Dockerfile Dockerfile.balanced Dockerfile.slim Dockerfile.fast \
                 .pre-commit-config.yaml
          # Stage any files reformatted by updated hooks
          git add -u -- scripts/ tests/ hooks/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create commit message
          cat > commit_message.txt << 'COMMIT_MSG'
          chore(deps): weekly auto-update of security tools and pre-commit hooks

          Automated weekly update of security tools and pre-commit hook versions.

          Co-Authored-By: Claude <noreply@anthropic.com>
          COMMIT_MSG

          # Commit changes
          git commit -F commit_message.txt

          # Push branch
          git push origin "$BRANCH"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"

          # Create PR body
          cat > pr_body.txt << 'PR_BODY'
          ## Weekly Tool & Pre-commit Updates

          This PR automatically updates security tools and pre-commit hooks to their latest versions.

          ### What's Updated

          - **Security tools**: Updated via `update_versions.py --update-all`, Dockerfiles synced
          - **Pre-commit hooks**: Updated via `pre-commit autoupdate`, formatting applied

          ### Auto-Merge Policy

          This PR will auto-merge if:
          - All CI tests pass
          - No conflicts with main branch
          - Version consistency check passes

          ---

          **Automated PR** - Generated by maintenance workflow (tool-update task)
          **Schedule**: Every Sunday at 00:00 UTC
          **Workflow**: `.github/workflows/maintenance.yml`
          PR_BODY

          # Create PR
          gh pr create \
            --title "chore(deps): weekly auto-update $(date +%Y-%m-%d)" \
            --body-file pr_body.txt \
            --base main \
            --head "$BRANCH" \
            --label "dependencies" \
            --label "automated"

          # Enable auto-merge
          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
          gh pr merge "$PR_NUMBER" --auto --squash

      - name: Summary
        if: always()
        run: |
          {
            echo "## Weekly Tool Update Summary"
            echo ""

            if [[ "${{ steps.commit.outputs.has_changes }}" == "true" ]]; then
              echo "**Updates applied successfully**"
              echo ""
              echo "- Branch created: \`${{ steps.commit.outputs.branch }}\`"
              echo "- Pull request created and set to auto-merge"
              echo "- Will merge automatically when CI passes"
              echo ""
              if [[ "${{ steps.check.outputs.updates_available }}" == "true" ]]; then
                echo "- Security tools: updated"
              else
                echo "- Security tools: already up-to-date"
              fi
              echo "- Pre-commit hooks: checked for updates"
            else
              echo "**All tools and hooks already up-to-date**"
              echo ""
              echo "No updates needed this week."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Version Checks ───────────────────────────────────────────────────────────
  # Runs: Sunday 02:00 UTC (schedule) OR manual dispatch with task=version-check/all
  # Depends on auto-update-tools when both run together (manual dispatch with task=all)
  check-versions:
    name: Check tool versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'version-check' || github.event.inputs.task == 'all'))
      )
    needs:
      - auto-update-tools
    # always() ensures this job runs even when auto-update-tools is skipped
    # (e.g., on the Sunday 02:00 schedule when only version checks are triggered)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Check for latest versions
        id: check
        run: |
          set -euo pipefail
          if ! python3 scripts/dev/update_versions.py --check-latest > version_check_output.txt 2>&1; then
            cat version_check_output.txt
            echo "::error::update_versions.py --check-latest failed"
            exit 1
          fi
          cat version_check_output.txt
          if grep -q "UPDATE AVAILABLE" version_check_output.txt; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate version report
        run: |
          python3 scripts/dev/update_versions.py --report

      - name: Check outdated tools and create issues
        if: github.event_name == 'schedule' || github.event.inputs.create_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/dev/update_versions.py --check-outdated --create-issues

      - name: Validate version consistency across files
        run: |
          # Check Dockerfile versions match versions.yaml
          python3 scripts/dev/update_versions.py --sync --dry-run || {
            echo "::error::Dockerfiles are out of sync with versions.yaml"
            echo "::error::Run: python3 scripts/dev/update_versions.py --sync"
            exit 1
          }

      - name: Check for Trivy version mismatch (critical)
        run: |
          # Extract Trivy versions from all 4 Dockerfiles
          # shellcheck disable=SC2252
          TRIVY_FULL=$(grep -oP 'TRIVY_VERSION="\K[0-9.]+' Dockerfile || echo "not_found")
          # shellcheck disable=SC2252
          TRIVY_BALANCED=$(grep -oP 'TRIVY_VERSION="\K[0-9.]+' Dockerfile.balanced || echo "not_found")
          # shellcheck disable=SC2252
          TRIVY_SLIM=$(grep -oP 'TRIVY_VERSION="\K[0-9.]+' Dockerfile.slim || echo "not_found")
          # shellcheck disable=SC2252
          TRIVY_FAST=$(grep -oP 'TRIVY_VERSION="\K[0-9.]+' Dockerfile.fast || echo "not_found")

          echo "Trivy versions found:"
          echo "  Dockerfile:          $TRIVY_FULL"
          echo "  Dockerfile.balanced: $TRIVY_BALANCED"
          echo "  Dockerfile.slim:     $TRIVY_SLIM"
          echo "  Dockerfile.fast:     $TRIVY_FAST"

          # Check for mismatches across all 4 variants
          # shellcheck disable=SC2252
          if [ "$TRIVY_FULL" != "$TRIVY_BALANCED" ] || \
             [ "$TRIVY_FULL" != "$TRIVY_SLIM" ] || \
             [ "$TRIVY_FULL" != "$TRIVY_FAST" ]; then
            echo "::error::CRITICAL: Trivy version mismatch detected!"
            echo "::error::This can cause CVE detection discrepancies (see ROADMAP.md #14)"
            exit 1
          fi

          echo "All Trivy versions are consistent across 4 variants: $TRIVY_FULL"

  check-dockerfile-consistency:
    name: Validate Dockerfile consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'version-check' || github.event.inputs.task == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for hardcoded versions in Dockerfiles
        run: |
          # This check ensures versions are parameterized via ARG/ENV variables
          # and not hardcoded inline

          ISSUES=0

          # Check for inline version patterns that should use variables
          for dockerfile in Dockerfile Dockerfile.balanced Dockerfile.slim Dockerfile.fast; do
            echo "Checking $dockerfile for hardcoded versions..."

            # Look for download URLs with hardcoded versions (bad pattern)
            if grep -P 'github.com/[^/]+/[^/]+/releases/download/v[0-9]+\.[0-9]+\.[0-9]+/' "$dockerfile" | grep -v "\${.*_VERSION}"; then
              echo "::warning file=$dockerfile::Found hardcoded version in download URL"
              ISSUES=$((ISSUES + 1))
            fi
          done

          if [ $ISSUES -gt 0 ]; then
            echo "::notice::Found $ISSUES potential hardcoded versions. Review manually."
          else
            echo "No hardcoded versions detected"
          fi

  check-python-deps:
    name: Check Python dependency freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'version-check' || github.event.inputs.task == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check PyPI for security tool updates
        run: |
          # Check if Python security tools have updates
          for tool in bandit semgrep checkov ruff; do
            echo "Checking $tool..."
            CURRENT=$(grep -oP "${tool}==[0-9.]+" Dockerfile | head -n1 | cut -d'=' -f3 || echo "unknown")
            LATEST=$(pip index versions "$tool" 2>/dev/null | grep -oP '(?<=Available versions: )[0-9.]+' | head -n1 || echo "unknown")

            echo "  Current: $CURRENT"
            echo "  Latest:  $LATEST"

            if [ "$CURRENT" != "$LATEST" ] && [ "$CURRENT" != "unknown" ] && [ "$LATEST" != "unknown" ]; then
              echo "::notice::$tool has update available: $CURRENT -> $LATEST"
            fi
          done

  # Summary job - fails if any critical version check issues found
  version-check-summary:
    name: Version check summary
    runs-on: ubuntu-latest
    needs: [check-versions, check-dockerfile-consistency, check-python-deps]
    if: >
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'version-check' || github.event.inputs.task == 'all'))
      )
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.check-versions.result }}" == "failure" ]; then
            echo "::error::Version check failed - see check-versions job"
            exit 1
          fi

          if [ "${{ needs.check-dockerfile-consistency.result }}" == "failure" ]; then
            echo "::error::Dockerfile consistency check failed"
            exit 1
          fi

          if [ "${{ needs.check-python-deps.result }}" == "failure" ]; then
            echo "::error::Python dependency check failed"
            exit 1
          fi

          echo "All version checks passed"

  # ─── Repository Completeness ─────────────────────────────────────────────────
  # Runs: Monday 06:00 UTC (schedule) OR push/PR OR manual dispatch with task=completeness/all
  repo-completeness:
    name: Repository Completeness Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'completeness' || github.event.inputs.task == 'all'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run repository completeness analysis
        run: |
          python3 scripts/dev/analyze_repo_completeness.py

      - name: Upload analysis report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: repo-completeness-analysis-${{ github.run_id }}
          path: dev-only/REPO_COMPLETENESS_ANALYSIS.json
          retention-days: 30

      - name: Check for critical issues
        id: check
        run: |
          CRITICAL_COUNT=$(jq '.summary.critical_issues' dev-only/REPO_COMPLETENESS_ANALYSIS.json)
          TOTAL_COUNT=$(jq '.summary.total_issues' dev-only/REPO_COMPLETENESS_ANALYSIS.json)

          echo "critical=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_COUNT" >> $GITHUB_OUTPUT

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Found $CRITICAL_COUNT critical issues (total: $TOTAL_COUNT)"
            echo "Review: dev-only/REPO_COMPLETENESS_ANALYSIS.json"
            # Warning only - change to exit 1 when issues resolved
            exit 0
          fi

          echo "No critical issues found (total: $TOTAL_COUNT)"

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('dev-only/REPO_COMPLETENESS_ANALYSIS.json', 'utf8'));

            const criticalCount = report.summary.critical_issues;
            const totalCount = report.summary.total_issues;

            const statusEmoji = criticalCount === 0 ? 'PASS' : 'WARNING';
            const statusIcon = criticalCount === 0 ? ':white_check_mark:' : ':warning:';

            const summary = `
            ## ${statusIcon} Repository Completeness Analysis: ${statusEmoji}

            **Total Issues:** ${totalCount}
            **Critical Issues:** ${criticalCount}

            ### Breakdown
            - Undocumented features: ${report.findings.undocumented_features.length}
            - Doc-code drift: ${report.findings.doc_code_drift.length}
            - Test gaps: ${report.findings.test_gaps.length}
            - Inconsistencies: ${report.findings.inconsistencies.length}

            ### Top Recommendations
            ${report.findings.recommendations.slice(0, 5).map(r => `- **[${r.priority}]** ${r.action} (${r.count} items)`).join('\n')}

            <details>
            <summary>View Full Report</summary>

            #### Undocumented Features (${report.findings.undocumented_features.length})
            ${report.findings.undocumented_features
              .slice(0, 10)
              .map(f => `- \`${f.file}:${f.line}\` - ${f.name} (${f.severity})`)
              .join('\n')}
            ${report.findings.undocumented_features.length > 10
              ? `\n_...and ${report.findings.undocumented_features.length - 10} more_`
              : ''}

            #### Doc-Code Drift (${report.findings.doc_code_drift.length})
            ${report.findings.doc_code_drift.map(d => `- ${d.issue} (${d.severity})`).join('\n')}

            #### Test Gaps (${report.findings.test_gaps.length})
            ${report.findings.test_gaps.slice(0, 10).map(t => `- \`${t.file}\``).join('\n')}
            ${report.findings.test_gaps.length > 10 ? `\n_...and ${report.findings.test_gaps.length - 10} more_` : ''}

            </details>

            ---

            **Full Analysis:**
            [Download artifact](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            **Action Plan:**
            [UNIFICATION_ACTION_PLAN.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/dev-only/UNIFICATION_ACTION_PLAN.md)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
