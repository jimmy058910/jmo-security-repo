# Dependabot configuration for JMo Security Suite
# Part of 5-layer version management system (ROADMAP.md #14, Issue #46)
# Handles: Python packages, Docker base images, GitHub Actions
#
# Schedule: Weekly on Monday at 9 AM UTC (after weekend development settles)
# Rationale: Prevents race conditions where Dependabot creates PRs before
#            critical commits (e.g., new modules) are merged to main branch

version: 2

updates:
  # Python dependencies (requirements-dev.txt via uv pip compile --universal)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "jimmy058910"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    # Group by risk tier to collapse PR volume:
    # - python-minor-patch: non-breaking bumps (all deps, grouped weekly)
    # - python-major: one PR per major bump (stay un-grouped so we can review each)
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base images (Ubuntu, Alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "jimmy058910"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "jimmy058910"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    # Group ALL action bumps (patch + minor + major) into one weekly PR.
    # GitHub Actions tend to have stable APIs and bunch of tiny bumps — a single
    # PR to review is dramatically lighter than 5-8 separate ones.
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

  # npm dependencies - scripts/dashboard
  - package-ecosystem: "npm"
    directory: "/scripts/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    groups:
      dashboard-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm dependencies - scripts/api
  - package-ecosystem: "npm"
    directory: "/scripts/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    groups:
      api-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

# Important notes:
# 1. Dependabot DOES NOT track binary tools (trivy, trufflehog, syft, etc.)
#    Those are managed via versions.yaml + update_versions.py + CI checks
# 2. Python security tools (semgrep, checkov, bandit) are tracked in Dockerfiles
#    but should be manually synced via update_versions.py after Dependabot PRs
# 3. For critical tool updates, use scripts/dev/update_versions.py directly
# 4. Weekly version-check.yml workflow creates issues for outdated tools
