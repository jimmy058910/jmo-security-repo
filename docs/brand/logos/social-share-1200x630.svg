<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="JMo Security — Open Graph social share image">
  <title>JMo Security — Security Audit Tool Suite</title>
  <!--
    Open Graph / Twitter Card social share image.
    Dimensions: 1200×630 (standard OG ratio).
    Background: brand-primary-dark (#0d47a1, logo navy).

    Colors:
      Ring/wordmark: #ffffff (white — inverted for dark bg)
      Lens:          #42a5f5 (brand-accent — works on both light and dark)
      Handle:        #9e9e9e (neutral-500)
      Padlock:       #ffffff (white)
      Tagline:       #42a5f5 (accent blue — subtle differentiation from white title)
  -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d47a1"/>

  <!-- ── Left: JM wordmark ──────────────────────────────── -->
  <text x="80" y="365"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="280" fill="#ffffff">JM</text>

  <!-- ── Center: Magnifying glass (at O position) ─────── -->
  <!-- Handle (behind lens/ring) -->
  <line x1="820" y1="340" x2="920" y2="440"
        stroke="#9e9e9e" stroke-width="46" stroke-linecap="round"/>

  <!-- Lens fill -->
  <circle cx="720" cy="240" r="164" fill="#42a5f5"/>

  <!-- Outer ring -->
  <circle cx="720" cy="240" r="164"
          fill="none" stroke="#ffffff" stroke-width="36"/>

  <!-- Padlock shackle -->
  <path d="M664,258 L664,198 A56,56 0 0,1 776,198 L776,258"
        fill="none" stroke="#ffffff" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Padlock body -->
  <rect x="646" y="240" width="148" height="108" rx="16" fill="#ffffff"/>

  <!-- Keyhole -->
  <circle cx="720" cy="281" r="18" fill="#42a5f5"/>
  <rect x="712" y="281" width="16" height="30" rx="4" fill="#42a5f5"/>

  <!-- ── Tagline ────────────────────────────────────────── -->
  <text x="80" y="475"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="38" fill="#42a5f5"
        letter-spacing="7" textLength="840" lengthAdjust="spacing">SECURITY AUDIT TOOL SUITE</text>

  <!-- ── Descriptor line ──────────────────────────────── -->
  <text x="80" y="530"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="24" fill="#ffffff" opacity="0.7">
    28 scanners · one deduplicated report · local-first · no telemetry
  </text>
</svg>
