# MkDocs configuration for JMo Security documentation
# docs_dir: . is required because this file lives inside docs/ (MkDocs defaults to docs/ relative to config)
docs_dir: .
site_name: JMo Security Documentation
site_url: https://docs.jmotools.com
site_description: Unified security scanning platform - SAST, DAST, SCA, secrets detection, compliance automation
site_author: JMo Gaming LLC

# Repository
repo_name: jimmy058910/jmo-security-repo
repo_url: https://github.com/jimmy058910/jmo-security-repo
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024-2026 JMo Gaming LLC

# Theme
theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
      - User Guide: USER_GUIDE.md
      - Docker Guide: DOCKER_README.md
      - Installation: MANUAL_INSTALLATION.md
      - FAQ: FAQ.md
  - Scanning:
      - Profiles and Tools: PROFILES_AND_TOOLS.md
      - Scan Optimization: SCAN_OPTIMIZATION.md
      - Results Guide: RESULTS_GUIDE.md
      - Diff Guide: DIFF_GUIDE.md
      - Trends Guide: TRENDS_GUIDE.md
      - History Guide: HISTORY_GUIDE.md
      - Schedule Guide: SCHEDULE_GUIDE.md
  - Compliance & Policy:
      - Policy-as-Code: POLICY_AS_CODE.md
      - SLSA Attestation: SLSA_GUIDE.md
  - Integrations:
      - MCP / AI Remediation: MCP_SETUP.md
      - Claude Code: integrations/CLAUDE_CODE.md
      - GitHub Copilot: integrations/GITHUB_COPILOT.md
  - Examples:
      - Overview: examples/README.md
      - Wizard Examples: examples/wizard-examples.md
      - Slack Notifications: examples/slack-notifications.md
  - Advanced:
      - Version Management: VERSION_MANAGEMENT.md
      - Release Process: RELEASE.md
      - Troubleshooting: TROUBLESHOOTING.md

# Plugins
plugins:
  - search

# Extra
extra:
  social:
    - icon: fontawesome/solid/house
      link: https://jmotools.com
      name: JMo Security home
    - icon: fontawesome/brands/github
      link: https://github.com/jimmy058910
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/jmosecurity
      name: X/Twitter
    - icon: fontawesome/solid/paper-plane
      link: https://jmotools.com/subscribe.html
      name: Subscribe
    - icon: fontawesome/solid/blog
      link: https://blog.jmotools.com
      name: Blog
  meta:
    - name: keywords
      content: >-
        security scanner, SAST, DAST, SCA, secrets detection, compliance automation,
        OWASP, NIST CSF, CIS, PCI DSS, MITRE ATT&CK, open source,
        DevSecOps, CI/CD, Python, jmo-security, 28 scanners
    - name: author
      content: "JMo Gaming LLC"
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
